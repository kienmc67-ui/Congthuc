<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ Minecraft Ultimate Encyclopedia (Java & PE)</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
    :root { --primary: #44ffaa; --accent: #ffdd33; --bg: #050510; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Quicksand',sans-serif;background:var(--bg);color:#f0f0ff;min-height:100vh;overflow-x:hidden;}
    
    header{text-align:center;padding:40px 20px;background:linear-gradient(to bottom, #101025, var(--bg));border-bottom:4px solid #333;}
    header h1{font-family:'Press Start 2P',monospace;font-size:clamp(0.8rem,4vw,1.8rem);color:var(--accent);text-shadow:4px 4px #000;line-height:1.5;}

    .edition-selector{display:flex;justify-content:center;gap:15px;margin:25px 0;}
    .edition-btn{padding:12px 20px;border-radius:8px;border:3px solid var(--accent);background:transparent;color:var(--accent);font-family:'Press Start 2P';font-size:0.6rem;cursor:pointer;transition:0.3s;}
    .edition-btn.active{background:var(--accent);color:#000;box-shadow:0 0 20px rgba(255,221,51,0.4);}

    .search-wrap{position:sticky;top:0;z-index:100;background:var(--bg);padding:15px;text-align:center;}
    .search-box input{width:95%;max-width:900px;padding:20px;background:#15173a;border:3px solid var(--primary);border-radius:12px;color:#fff;font-size:1.2rem;outline:none;box-shadow:0 5px 15px rgba(0,0,0,0.5);}

    .categories{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding:20px;}
    .cat-btn{padding:10px 25px;background:#1f2a44;border:2px solid #333;color:#fff;border-radius:30px;cursor:pointer;font-weight:bold;transition:0.2s;}
    .cat-btn.active{background:var(--primary);color:#000;border-color:var(--primary);}

    .recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px;padding:20px;max-width:1600px;margin:0 auto;}
    .recipe-card{background:rgba(31,42,68,0.8);border:2px solid rgba(255,255,255,0.05);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:0.3s;}
    .recipe-card:hover{transform:translateY(-8px);border-color:var(--primary);box-shadow:0 10px 25px rgba(68,255,170,0.2);}
    .recipe-card img{width:70px;height:70px;image-rendering:pixelated;margin-bottom:12px;}
    .recipe-card div{font-size:0.8rem;font-weight:bold;color:#ccc;text-transform:uppercase;}

    /* Crafting UI Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(5px);}
    .modal-overlay.active{display:flex;}
    .modal{background:#1f2a44;border:5px solid var(--accent);padding:30px;width:95%;max-width:550px;position:relative;border-radius:20px;}
    
    .craft-table{background:#8b8b8b;padding:20px;border:5px solid #373737;margin:20px auto;border-radius:10px;display:grid;grid-template-columns:repeat(3,64px);gap:6px;box-shadow:5px 5px 0 #000;}
    .slot{width:64px;height:64px;background:#8b8b8b;border:3px solid #373737;box-shadow:inset 4px 4px 0 #373737, inset -4px -4px 0 #fff;display:flex;align-items:center;justify-content:center;}
    .slot img{width:50px;height:50px;image-rendering:pixelated;}

    .result-container{display:flex;flex-direction:column;align-items:center;margin-top:20px;}
    .result-slot{width:100px;height:100px;background:#8b8b8b;border:5px solid var(--primary);display:flex;align-items:center;justify-content:center;position:relative;box-shadow:5px 5px 0 #000;}
    .result-slot img{width:70px;height:70px;image-rendering:pixelated;}
    .qty{position:absolute;bottom:8px;right:10px;font-family:'Press Start 2P';font-size:1.2rem;color:#fff;text-shadow:3px 3px #000;}
</style>
</head>
<body>

<header>
    <h1>MINECRAFT ENCYCLOPEDIA</h1>
    <p style="margin-top:10px;color: #888;">Cập nhật đến Java 1.26 / PE 1.26.3</p>
    <div class="edition-selector">
        <button class="edition-btn active" id="btn-java" onclick="setEdition('java')">JAVA EDITION</button>
        <button class="edition-btn" id="btn-pe" onclick="setEdition('bedrock')">PE / BEDROCK</button>
    </div>
</header>

<div class="search-wrap">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Gõ tên vật phẩm (Vd: mace, sword, door, copper...)" oninput="render()">
    </div>
</div>

<div class="categories" id="catBox"></div>
<div class="recipe-grid" id="recipeGrid"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <h2 id="mTitle" style="text-align:center;color:var(--accent);font-family:'Press Start 2P';font-size:0.9rem;"></h2>
        <div class="craft-table" id="mGrid"></div>
        <div class="result-container">
            <div style="font-size:2rem;color:var(--primary);margin-bottom:15px;">⬇</div>
            <div class="result-slot">
                <img id="mResImg" src="">
                <span class="qty" id="mQty"></span>
            </div>
            <p id="mResName" style="margin-top:15px;font-weight:bold;color:var(--primary);"></p>
        </div>
    </div>
</div>

<script>
const ITEM_API = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/item/";
const BLOCK_API = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/block/";

let currentEdition = 'java';
let currentCat = 'All';
let MASTER_DB = [];

// Hàm sửa lỗi ảnh thông minh
function smartIcon(id) {
    return {
        id: id,
        primary: ITEM_API + id + ".png",
        secondary: BLOCK_API + id + ".png",
        fallback: ITEM_API + "barrier.png"
    };
}

function imgError(img, id) {
    if (img.src.includes('/item/')) {
        img.src = BLOCK_API + id + ".png";
    } else if (img.src.includes('/block/')) {
        img.src = ITEM_API + "barrier.png";
    }
}

// BỘ TẠO CÔNG THỨC TỰ ĐỘNG
function buildDatabase() {
    MASTER_DB = [];
    const stick = smartIcon('stick');
    const planks = ['oak','spruce','birch','jungle','acacia','dark_oak','mangrove','cherry','bamboo','pale_oak'];
    const materials = [
        {id:'wooden', mat:'oak_planks'}, {id:'stone', mat:'cobblestone'},
        {id:'iron', mat:'iron_ingot'}, {id:'gold', mat:'gold_ingot'},
        {id:'diamond', mat:'diamond'}, {id:'netherite', mat:'netherite_ingot'}
    ];

    // 1. TẠO CÔNG CỤ & GIÁP (Cho tất cả vật liệu)
    materials.forEach(m => {
        const itemMat = smartIcon(m.mat);
        // Kiếm, Cúp, Rìu, Xẻng, Cuốc
        const tools = [
            {suffix:'_sword', g:[null,itemMat,null, null,itemMat,null, null,stick,null], cat:'Combat'},
            {suffix:'_pickaxe', g:[itemMat,itemMat,itemMat, null,stick,null, null,stick,null], cat:'Tools'},
            {suffix:'_axe', g:[itemMat,itemMat,null, itemMat,stick,null, null,stick,null], cat:'Tools'},
            {suffix:'_shovel', g:[null,itemMat,null, null,stick,null, null,stick,null], cat:'Tools'},
            {suffix:'_hoe', g:[itemMat,itemMat,null, null,stick,null, null,stick,null], cat:'Tools'}
        ];
        // Mũ, Áo, Quần, Giày
        const armors = [
            {suffix:'_helmet', g:[itemMat,itemMat,itemMat, itemMat,null,itemMat, null,null,null], cat:'Armor'},
            {suffix:'_chestplate', g:[itemMat,null,itemMat, itemMat,itemMat,itemMat, itemMat,itemMat,itemMat], cat:'Armor'},
            {suffix:'_leggings', g:[itemMat,itemMat,itemMat, itemMat,null,itemMat, itemMat,null,itemMat], cat:'Armor'},
            {suffix:'_boots', g:[null,null,null, itemMat,null,itemMat, itemMat,null,itemMat], cat:'Armor'}
        ];
        [...tools, ...armors].forEach(t => {
            MASTER_DB.push({ id: m.id + t.suffix, cat: t.cat, grid: t.g, count: 1, ed: 'both' });
        });
    });

    // 2. TẠO VẬT PHẨM GỖ (Thuyền, Cửa, Hàng rào...)
    planks.forEach(p => {
        const pk = smartIcon(p + '_planks');
        // Thuyền (Khác biệt Java/PE)
        MASTER_DB.push({ id: p + '_boat', cat: 'Misc', grid: [null,null,null, pk,null,pk, pk,pk,pk], count: 1, ed: 'java' });
        MASTER_DB.push({ id: p + '_boat', cat: 'Misc', grid: [null,null,null, pk,smartIcon('wooden_shovel'),pk, pk,pk,pk], count: 1, ed: 'bedrock' });
        
        // Cửa, Trapdoor
        MASTER_DB.push({ id: p + '_door', cat: 'Build', grid: [pk,pk,null, pk,pk,null, pk,pk,null], count: 3, ed: 'both' });
        MASTER_DB.push({ id: p + '_trapdoor', cat: 'Build', grid: [null,null,null, pk,pk,pk, pk,pk,pk], count: 2, ed: 'both' });
    });

    // 3. CÁC CÔNG THỨC ĐẶC BIỆT (1.21 - 1.26)
    const specials = [
        { id:'mace', cat:'Combat', grid:[null,null,null, null,smartIcon('heavy_core'),null, null,smartIcon('breeze_rod'),null], count:1 },
        { id:'crafter', cat:'Redstone', grid:[smartIcon('iron_ingot'),smartIcon('iron_ingot'),smartIcon('iron_ingot'), smartIcon('iron_ingot'),smartIcon('crafting_table'),smartIcon('iron_ingot'), smartIcon('redstone'),smartIcon('dropper'),smartIcon('redstone')], count:1 },
        { id:'copper_bulb', cat:'Redstone', grid:[smartIcon('copper_ingot'),smartIcon('copper_ingot'),smartIcon('copper_ingot'), smartIcon('copper_ingot'),smartIcon('blaze_rod'),smartIcon('copper_ingot'), smartIcon('copper_ingot'),smartIcon('redstone'),smartIcon('copper_ingot')], count:4 },
        { id:'bundle', cat:'Misc', grid:[smartIcon('string'),smartIcon('leather'),smartIcon('string'), null,null,null, null,null,null], count:1 },
        { id:'piston', cat:'Redstone', grid:[smartIcon('oak_planks'),smartIcon('oak_planks'),smartIcon('oak_planks'), smartIcon('cobblestone'),smartIcon('iron_ingot'),smartIcon('cobblestone'), smartIcon('cobblestone'),smartIcon('redstone'),smartIcon('cobblestone')], count:1 },
        { id:'enchanting_table', cat:'Misc', grid:[null,smartIcon('book'),null, smartIcon('diamond'),smartIcon('obsidian'),smartIcon('diamond'), smartIcon('obsidian'),smartIcon('obsidian'),smartIcon('obsidian')], count:1 },
        { id:'beacon', cat:'Misc', grid:[smartIcon('glass'),smartIcon('glass'),smartIcon('glass'), smartIcon('glass'),smartIcon('nether_star'),smartIcon('glass'), smartIcon('obsidian'),smartIcon('obsidian'),smartIcon('obsidian')], count:1 }
    ];
    specials.forEach(s => { s.ed = 'both'; MASTER_DB.push(s); });
}

function setEdition(ed) {
    currentEdition = ed;
    document.getElementById('btn-java').className = 'edition-btn' + (ed === 'java' ? ' active' : '');
    document.getElementById('btn-pe').className = 'edition-btn' + (ed === 'bedrock' ? ' active' : '');
    render();
}

function render() {
    const grid = document.getElementById('recipeGrid');
    const search = document.getElementById('searchInput').value.toLowerCase();
    grid.innerHTML = '';

    const filtered = MASTER_DB.filter(item => {
        const matchEd = item.ed === 'both' || item.ed === currentEdition;
        const matchCat = currentCat === 'All' || item.cat === currentCat;
        const matchSearch = item.id.replace(/_/g, ' ').includes(search);
        return matchEd && matchCat && matchSearch;
    });

    filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.innerHTML = `
            <img src="${item.grid.find(g => g !== null)?.primary || smartIcon(item.id).primary}" 
                 onerror="imgError(this, '${item.id}')" loading="lazy">
            <div>${item.id.replace(/_/g, ' ')}</div>
        `;
        card.onclick = () => openModal(item);
        grid.appendChild(card);
    });
}

function openModal(item) {
    document.getElementById('mTitle').innerText = item.id.replace(/_/g, ' ').toUpperCase();
    document.getElementById('mResName').innerText = item.id.replace(/_/g, ' ');
    document.getElementById('mQty').innerText = item.count > 1 ? item.count : '';
    
    const resImg = document.getElementById('mResImg');
    resImg.src = smartIcon(item.id).primary;
    resImg.onerror = () => imgError(resImg, item.id);

    const gridBox = document.getElementById('mGrid');
    gridBox.innerHTML = '';
    item.grid.forEach(slot => {
        const div = document.createElement('div');
        div.className = 'slot';
        if(slot) {
            div.innerHTML = `<img src="${slot.primary}" onerror="imgError(this, '${slot.id}')">`;
        }
        gridBox.appendChild(div);
    });
    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

// Khởi tạo
const categories = ['All', 'Combat', 'Tools', 'Armor', 'Build', 'Redstone', 'Misc'];
const catBox = document.getElementById('catBox');
categories.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c === 'All' ? ' active' : '');
    btn.innerText = c;
    btn.onclick = () => {
        currentCat = c;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    };
    catBox.appendChild(btn);
});

buildDatabase();
render();
</script>
</body>
</html>
