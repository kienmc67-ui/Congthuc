<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ Minecraft PC Recipes — Anti-Bario & Click Sound</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,#0a0a1f,#15173a,#1f2a44);color:#f0f0ff;min-height:100vh;padding-bottom:80px;}

/* FIX TEXTURE PC SẮC NÉT */
img {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}

header{text-align:center;padding:40px 20px 20px;}
header h1{font-family:'Press Start 2P',monospace;font-size:clamp(1.4rem,4vw,2.2rem);color:#ffdd33;text-shadow:0 0 15px rgba(255,221,51,.6);}

.search-wrap{padding:10px 20px 20px;text-align:center;}
.search-box{max-width:560px;margin:0 auto;}
.search-box input{width:100%;padding:16px 25px;background:rgba(10,10,31,.85);border:2px solid #ffdd33;border-radius:50px;color:#fff;outline:none;font-size:1rem;}

.categories{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:0 15px 25px;}
.cat-btn{padding:9px 18px;background:rgba(31,42,68,.75);border:2px solid rgba(255,221,51,.3);color:#fff;border-radius:30px;font-weight:700;cursor:pointer;transition:.2s;}
.cat-btn.active, .cat-btn:hover{background:#ffdd33;color:#0a0a1f;border-color:#ffdd33;}

.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:16px;padding:0 15px;max-width:1200px;margin:0 auto;}
.recipe-card{background:rgba(31,42,68,.85);border:2px solid rgba(255,221,51,.25);border-radius:14px;padding:15px;text-align:center;cursor:pointer;transition:.3s;}
.recipe-card:hover{transform:scale(1.06);border-color:#ffdd33;box-shadow:0 10px 25px rgba(255,221,51,0.3);}
.recipe-card img{width:64px;height:64px;margin-bottom:8px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:100;padding:15px;}
.modal-overlay.active{display:flex;}
.modal{background:#1f2a44;border:3px solid #ffdd33;border-radius:18px;width:100%;max-width:500px;padding:25px;position:relative;}
.modal-close{position:absolute;top:12px;right:12px;width:38px;height:38px;background:#ff5050;color:#fff;border:none;border-radius:50%;cursor:pointer;font-weight:bold;}

/* CRAFTING UI */
.craft-grid{display:grid;grid-template-columns:repeat(3,54px);gap:6px;margin:20px auto;background:#8b8b8b;padding:10px;border:4px solid #373737;width:fit-content;}
.craft-slot{width:54px;height:54px;background:#c6c6c6;border:3px solid;border-color:#373737 #fff #fff #373737;display:flex;align-items:center;justify-content:center;}
.craft-slot img{width:40px;height:40px;}
.result-display{text-align:center;margin-top:20px;}
.result-slot{width:80px;height:80px;background:#c6c6c6;border:4px solid #ffdd33;display:flex;align-items:center;justify-content:center;margin:0 auto;position:relative;}
.result-slot img{width:60px;height:60px;}
</style>
</head>
<body>

<audio id="clickSound" preload="auto">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<header>
  <h1>🛠️ MINECRAFT PC RECIPES</h1>
  <p style="color:#ffdd33; font-size:0.8rem; letter-spacing:1px;">JAVA ASSETS • NO BARIO ERROR • 1.21.x</p>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm kiếm vật phẩm..." />
  </div>
</div>

<div class="categories" id="categories"></div>
<div class="recipe-grid" id="recipeGrid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h2 id="modalTitle" style="color:#ffdd33;text-align:center;"></h2>
    <div class="craft-grid" id="craftGrid"></div>
    <div style="text-align:center; font-size:2rem; margin:10px 0;">⬇</div>
    <div class="result-display">
        <div class="result-slot"><img id="resultImg" src=""><span id="resultCount" style="position:absolute; bottom:5px; right:5px; font-family:'Press Start 2P'; font-size:12px;"></span></div>
        <p id="resultName" style="margin-top:10px; font-weight:700; color:#ffdd33;"></p>
    </div>
  </div>
</div>

<script>
// Cấu hình Asset và Âm thanh
const ITEM_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/item/";
const BLOCK_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/block/";
const clickSound = document.getElementById('clickSound');

function playClick() {
    clickSound.currentTime = 0;
    clickSound.volume = 0.5;
    clickSound.play();
}

function getIcon(id, isBlock = false) { 
    return (isBlock ? BLOCK_URL : ITEM_URL) + id + ".png"; 
}

const I = (id, isBlock = false) => ({ id, icon: getIcon(id, isBlock), name: id.replace(/_/g, ' ') });

// Danh sách công thức mẫu
let RECIPES = [
    { id:'mace', name:'Mace', cat:'Combat', icon: getIcon('mace'), grid: [null,null,null,null,I('heavy_core'),null,null,I('breeze_rod'),null], count: 1 },
    { id:'diamond_sword', name:'Diamond Sword', cat:'Combat', icon: getIcon('diamond_sword'), grid: [null,I('diamond'),null,null,I('diamond'),null,null,I('stick'),null], count: 1 },
    { id:'crafting_table', name:'Crafting Table', cat:'Build', icon: getIcon('crafting_table_front', true), grid: [null,null,null,I('oak_planks'),I('oak_planks'),null,I('oak_planks'),I('oak_planks'),null], count: 1 },
    { id:'tnt', name:'TNT', cat:'Redstone', icon: getIcon('tnt_side', true), grid: [I('gunpowder'),I('sand'),I('gunpowder'),I('sand'),I('gunpowder'),I('sand'),I('gunpowder'),I('sand'),I('gunpowder')], count: 1 }
];

// Hệ thống lọc và hiển thị
const CATS = ['All','Build','Combat','Redstone','Misc'];
let currentCat = 'All';

function renderCategories() {
    const container = document.getElementById('categories');
    CATS.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `cat-btn ${cat === 'All' ? 'active' : ''}`;
        btn.innerText = cat;
        btn.onclick = () => {
            playClick();
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid();
        };
        container.appendChild(btn);
    });
}

function renderGrid() {
    const grid = document.getElementById('recipeGrid');
    grid.innerHTML = '';
    const search = document.getElementById('searchInput').value.toLowerCase();
    
    const filtered = RECIPES.filter(r => 
        (currentCat === 'All' || r.cat === currentCat) && 
        (r.name.toLowerCase().includes(search))
    );

    filtered.forEach(r => {
        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.innerHTML = `<img src="${r.icon}"><h4>${r.name}</h4>`;
        card.onclick = () => { playClick(); showModal(r); };
        grid.appendChild(card);
    });
}

function showModal(r) {
    document.getElementById('modalTitle').innerText = r.name;
    document.getElementById('resultImg').src = r.icon;
    document.getElementById('resultName').innerText = r.name;
    document.getElementById('resultCount').innerText = r.count > 1 ? r.count : '';
    
    const cGrid = document.getElementById('craftGrid');
    cGrid.innerHTML = '';
    r.grid.forEach(item => {
        const slot = document.createElement('div');
        slot.className = 'craft-slot';
        if(item) slot.innerHTML = `<img src="${item.icon}">`;
        cGrid.appendChild(slot);
    });
    document.getElementById('modalOverlay').classList.add('active');
}

document.getElementById('modalClose').onclick = () => {
    playClick();
    document.getElementById('modalOverlay').classList.remove('active');
};

document.getElementById('searchInput').oninput = renderGrid;

// Khởi tạo
renderCategories();
renderGrid();
</script>
</body>
</html>
