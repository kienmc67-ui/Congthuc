<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ Minecraft Crafting Encyclopedia Fix</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
    :root { --primary: #44ffaa; --accent: #ffdd33; --bg: #0a0a1f; --card-bg: rgba(31,42,68,0.85); }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Quicksand',sans-serif;background:var(--bg);color:#f0f0ff;min-height:100vh;padding-bottom:50px;}
    
    header{text-align:center;padding:30px 20px;background:linear-gradient(to bottom, #15173a, var(--bg));border-bottom:3px solid var(--accent);}
    header h1{font-family:'Press Start 2P',monospace;font-size:clamp(0.8rem,4vw,1.5rem);color:var(--accent);text-shadow:3px 3px #000;}

    .search-wrap{position:sticky;top:0;z-index:100;background:var(--bg);padding:15px;text-align:center;}
    .search-box input{width:90%;max-width:600px;padding:15px;background:#15173a;border:3px solid var(--primary);border-radius:12px;color:#fff;font-size:1rem;outline:none;}

    .recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px;padding:20px;max-width:1200px;margin:0 auto;}
    .recipe-card{background:var(--card-bg);border:2px solid rgba(255,255,255,0.05);border-radius:14px;padding:20px;text-align:center;cursor:pointer;transition:0.3s;}
    .recipe-card:hover{transform:translateY(-5px);border-color:var(--primary);box-shadow:0 10px 20px rgba(68,255,170,0.15);}
    .recipe-card img{width:70px;height:70px;image-rendering:pixelated;margin-bottom:12px;}
    .recipe-card div{font-size:0.8rem;font-weight:bold;color:#ccc;text-transform:uppercase;}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:1000;}
    .modal-overlay.active{display:flex;}
    .modal{background:#1f2a44;border:4px solid var(--accent);padding:25px;width:95%;max-width:450px;border-radius:20px;text-align:center;}
    
    .craft-table{background:#8b8b8b;padding:12px;border:4px solid #373737;margin:20px auto;display:grid;grid-template-columns:repeat(3,55px);gap:5px;width:fit-content;box-shadow:4px 4px 0 #000;}
    .slot{width:55px;height:55px;background:#8b8b8b;border:2px solid #373737;box-shadow:inset 3px 3px 0 #373737, inset -3px -3px 0 #fff;display:flex;align-items:center;justify-content:center;}
    .slot img{width:42px;height:42px;image-rendering:pixelated;}
    .res-slot{width:85px;height:85px;background:#8b8b8b;border:4px solid var(--primary);margin:15px auto;display:flex;align-items:center;justify-content:center;position:relative;}
    .res-slot img{width:60px;height:60px;image-rendering:pixelated;}
</style>
</head>
<body>

<header>
    <h1>MINECRAFT ENCYCLOPEDIA</h1>
</header>

<div class="search-wrap">
    <input type="text" id="searchInput" class="search-box" placeholder="Tìm kiếm vật phẩm..." oninput="render()">
</div>

<div class="recipe-grid" id="recipeGrid"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <h2 id="mTitle" style="color:var(--accent);font-family:'Press Start 2P';font-size:0.8rem;"></h2>
        <div class="craft-table" id="mGrid"></div>
        <div style="font-size:2rem;color:var(--primary);">↓</div>
        <div class="res-slot"><img id="mResImg" src=""></div>
        <p id="mResName" style="font-weight:bold;color:var(--primary);"></p>
    </div>
</div>

<script>
// Sử dụng kho ảnh dự phòng nếu kho chính lỗi
const PRIMARY_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/item/";
const SECONDARY_URL = "https://minecraft.wiki/images/Invicon_"; // Cấu trúc wiki

let DB = [];

function getImg(id) { return PRIMARY_URL + id + ".png"; }

// Hàm sửa lỗi ảnh quan trọng nhất
function fixImg(img, id) {
    if (img.dataset.tried === "1") {
        // Thử lần 2: Lấy từ thư mục block
        img.src = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/block/" + id + ".png";
        img.dataset.tried = "2";
    } else if (img.dataset.tried === "2") {
        // Thử lần 3: Lấy từ nguồn Wiki (đối với các item đặc biệt)
        let wikiName = id.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('_');
        img.src = SECONDARY_URL + wikiName + ".png";
        img.dataset.tried = "3";
    } else if (!img.dataset.tried) {
        img.dataset.tried = "1";
    }
}

function init() {
    DB = [];
    const stick = {id:'stick', url: getImg('stick')};
    const materials = [
        {id:'wooden', mat: getImg('oak_planks'), name: 'oak_planks'},
        {id:'stone', mat: getImg('cobblestone'), name: 'cobblestone'},
        {id:'iron', mat: getImg('iron_ingot'), name: 'iron_ingot'},
        {id:'gold', mat: getImg('gold_ingot'), name: 'gold_ingot'},
        {id:'diamond', mat: getImg('diamond'), name: 'diamond'}
    ];

    materials.forEach(m => {
        let matIcon = {id: m.name, url: m.mat};
        // Sword
        DB.push({id: m.id+'_sword', grid:[null,matIcon,null, null,matIcon,null, null,stick,null]});
        // Pickaxe
        DB.push({id: m.id+'_pickaxe', grid:[matIcon,matIcon,matIcon, null,stick,null, null,stick,null]});
        // Axe
        DB.push({id: m.id+'_axe', grid:[matIcon,matIcon,null, matIcon,stick,null, null,stick,null]});
        // Chestplate
        DB.push({id: m.id+'_chestplate', grid:[matIcon,null,matIcon, matIcon,matIcon,matIcon, matIcon,matIcon,matIcon]});
    });
    
    // Thêm các món Redstone/Misc
    DB.push({id:'shield', grid:[{id:'oak_planks',url:getImg('oak_planks')},{id:'iron_ingot',url:getImg('iron_ingot')},{id:'oak_planks',url:getImg('oak_planks')},{id:'oak_planks',url:getImg('oak_planks')},{id:'oak_planks',url:getImg('oak_planks')},{id:'oak_planks',url:getImg('oak_planks')},null,{id:'oak_planks',url:getImg('oak_planks')},null]});

    render();
}

function render() {
    const grid = document.getElementById('recipeGrid');
    const search = document.getElementById('searchInput').value.toLowerCase();
    grid.innerHTML = '';

    DB.filter(i => i.id.includes(search)).forEach(item => {
        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.innerHTML = `<img src="${getImg(item.id)}" onerror="fixImg(this, '${item.id}')"><div>${item.id.replace(/_/g, ' ')}</div>`;
        card.onclick = () => openModal(item);
        grid.appendChild(card);
    });
}

function openModal(item) {
    document.getElementById('mTitle').innerText = item.id.replace(/_/g, ' ').toUpperCase();
    document.getElementById('mResName').innerText = item.id.replace(/_/g, ' ');
    const resImg = document.getElementById('mResImg');
    resImg.src = getImg(item.id);
    resImg.dataset.tried = ""; 
    
    const gBox = document.getElementById('mGrid');
    gBox.innerHTML = '';
    item.grid.forEach(slot => {
        const div = document.createElement('div');
        div.className = 'slot';
        if(slot) div.innerHTML = `<img src="${slot.url}" onerror="fixImg(this, '${slot.id}')">`;
        gBox.appendChild(div);
    });
    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

init();
</script>
</body>
</html>
