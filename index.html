<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ Minecraft Multi-Edition Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,#0a0a1f,#15173a,#1f2a44);color:#f0f0ff;min-height:100vh;padding-bottom:80px;}
header{text-align:center;padding:40px 20px 10px;}
header h1{font-family:'Press Start 2P',monospace;font-size:clamp(1.2rem,5vw,2.2rem);color:#ffdd33;text-shadow:0 0 15px rgba(255,221,51,.6);}

/* Edition Switcher */
.edition-selector{display:flex;justify-content:center;gap:15px;margin-bottom:20px;}
.edition-btn{padding:10px 25px;border-radius:10px;border:2px solid #ffdd33;background:transparent;color:#ffdd33;font-family:'Press Start 2P',cursive;font-size:0.7rem;cursor:pointer;transition:0.3s;}
.edition-btn.active{background:#ffdd33;color:#0a0a1f;box-shadow:0 0 15px rgba(255,221,51,0.5);}

.search-wrap{padding:10px 20px 10px;text-align:center;}
.search-box{max-width:560px;margin:0 auto;position:relative;}
.search-box input{width:100%;padding:16px 55px;background:rgba(10,10,31,.85);border:2px solid #44ffaa;border-radius:50px;color:#fff;outline:none;font-size:1.05rem;}

.categories{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:10px 15px 25px;}
.cat-btn{padding:9px 18px;background:rgba(31,42,68,.75);border:2px solid rgba(255,221,51,.3);color:#fff;border-radius:30px;font-weight:700;cursor:pointer;transition:.2s;}
.cat-btn.active, .cat-btn:hover{background:#44ffaa;color:#0a0a1f;border-color:#44ffaa;}

.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:16px;padding:0 15px;max-width:1200px;margin:0 auto;}
.recipe-card{background:rgba(31,42,68,.85);border:2px solid rgba(255,221,51,.25);border-radius:14px;padding:12px;text-align:center;cursor:pointer;transition:.3s;position:relative;overflow:hidden;}
.recipe-card:hover{transform:scale(1.06);border-color:#44ffaa;box-shadow:0 10px 25px rgba(68,255,170,.3);}
.recipe-card img{width:70px;height:70px;margin-bottom:8px;image-rendering:pixelated;}
.recipe-card .ed-tag{position:absolute;top:5px;right:5px;font-size:0.6rem;background:#ffdd33;color:#000;padding:2px 5px;border-radius:4px;font-weight:bold;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:100;padding:15px;}
.modal-overlay.active{display:flex;}
.modal{background:#1f2a44;border:3px solid #44ffaa;border-radius:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:25px;position:relative;}
.modal-close{position:absolute;top:12px;right:12px;width:38px;height:38px;background:rgba(255,80,80,.25);color:#ff8080;border:2px solid #ff8080;border-radius:50%;font-size:1.5rem;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.craft-grid{display:grid;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(3,54px);gap:6px;margin:20px auto;background:#3d2814;padding:14px;border:4px solid #2a1a08;border-radius:10px;width:fit-content;}
.craft-slot{width:54px;height:54px;background:#8b8b8b;border-top:2px solid #373737;border-left:2px solid #373737;border-bottom:2px solid #fff;border-right:2px solid #fff;display:flex;align-items:center;justify-content:center;position:relative;}
.craft-slot img{width:46px;height:46px;image-rendering:pixelated;}
.result-slot{width:82px;height:82px;border:4px solid #44ffaa;border-radius:10px;background:#8b8b8b;display:flex;align-items:center;justify-content:center;margin:20px auto;position:relative;}
.result-slot img{width:66px;height:66px;image-rendering:pixelated;}
.result-slot .count{position:absolute;bottom:6px;right:8px;font-family:'Press Start 2P',font-size:1.1rem;color:#fff;text-shadow:1px 1px 2px #000;}
</style>
</head>
<body>

<header>
  <h1>🛠️ MINECRAFT RECIPES</h1>
  <div class="edition-selector">
    <button class="edition-btn active" onclick="setEdition('java')">JAVA</button>
    <button class="edition-btn" onclick="setEdition('bedrock')">BEDROCK / PE</button>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm công thức (mace, boat, chest...)" />
  </div>
</div>

<div class="categories" id="categories"></div>
<div class="recipe-grid" id="recipeGrid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h2 id="modalTitle" style="color:#44ffaa;text-align:center;margin:10px 0;"></h2>
    <p id="modalDesc" style="text-align:center;color:#b8ffd0;margin-bottom:20px;"></p>
    <div class="craft-grid" id="craftGrid"></div>
    <div style="text-align:center;font-size:2rem;color:#44ffaa;margin:10px 0;">↓</div>
    <div class="result-slot">
      <img id="resultImg" src="" alt="">
      <span class="count" id="resultCount"></span>
    </div>
    <div id="resultName" style="text-align:center;color:#44ffaa;font-weight:bold;margin-top:10px;"></div>
  </div>
</div>

<script>
const ITEM_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/item/";
const BLOCK_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/block/";

let currentEdition = 'java'; 
let currentCat = 'All';
let currentSearch = '';

function getIcon(id) { return ITEM_URL + id + ".png"; }
function formatName(id) { return id.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); }
const I = id => ({ id: id, icon: getIcon(id), name: formatName(id) });

// DB Recipes
let JAVA_RECIPES = [];
let BEDROCK_RECIPES = [];

function initData() {
    const commonPlanks = I('oak_planks');
    const commonStick = I('stick');
    const commonIron = I('iron_ingot');

    // 1. BOAT LOGIC (Khác biệt lớn nhất)
    const woods = ['oak','spruce','birch','jungle','acacia','dark_oak','mangrove','cherry'];
    woods.forEach(w => {
        const p = I(w + '_planks');
        const s = I('wooden_shovel');
        // Java: Không cần xẻng
        JAVA_RECIPES.push({ id:w+'_boat', name:formatName(w)+' Boat', cat:'Misc', icon: getIcon(w+'_boat'), desc:'Chế tạo trên Java (không cần xẻng).', grid:[null,null,null, p,null,p, p,p,p], count:1 });
        // Bedrock: Cần xẻng gỗ ở giữa
        BEDROCK_RECIPES.push({ id:w+'_boat', name:formatName(w)+' Boat', cat:'Misc', icon: getIcon(w+'_boat'), desc:'Chế tạo trên Bedrock (cần xẻng gỗ).', grid:[null,null,null, p,s,p, p,p,p], count:1 });
    });

    // 2. MACE (1.21 Core) - Giống nhau
    const maceData = { id:'mace', name:'Mace', cat:'Combat', icon: getIcon('mace'), desc: 'Vũ khí cực mạnh từ bản 1.21.', grid: [null,null,null, null,I('heavy_core'),null, null,I('breeze_rod'),null], count: 1 };
    JAVA_RECIPES.push(maceData);
    BEDROCK_RECIPES.push(maceData);

    // 3. CORE ITEMS
    const cores = [
        { id:'crafting_table', name:'Crafting Table', cat:'Build', icon: BLOCK_URL+'crafting_table_top.png', grid:[null,null,null, null,I('oak_planks'),I('oak_planks'), null,I('oak_planks'),I('oak_planks')], count:1 },
        { id:'chest', name:'Chest', cat:'Build', icon: BLOCK_URL+'chest_front.png', grid:[I('oak_planks'),I('oak_planks'),I('oak_planks'), I('oak_planks'),null,I('oak_planks'), I('oak_planks'),I('oak_planks'),I('oak_planks')], count:1 }
    ];
    cores.forEach(c => { JAVA_RECIPES.push(c); BEDROCK_RECIPES.push(c); });

    // 4. TOOLS GENERATOR
    const toolMats = [{ p: 'wooden', m: I('oak_planks') }, { p: 'iron', m: I('iron_ingot') }, { p: 'diamond', m: I('diamond') }];
    toolMats.forEach(t => {
        const pick = { id:t.p+'_pickaxe', name:formatName(t.p)+' Pickaxe', cat:'Tools', icon:getIcon(t.p+'_pickaxe'), grid:[t.m,t.m,t.m, null,I('stick'),null, null,I('stick'),null], count:1 };
        JAVA_RECIPES.push(pick); BEDROCK_RECIPES.push(pick);
    });

    // 5. REDSTONE
    const observer = { id:'observer', name:'Observer', cat:'Redstone', icon: BLOCK_URL+'observer_front.png', grid:[I('cobblestone'),I('cobblestone'),I('cobblestone'), I('redstone'),I('redstone'),I('quartz'), I('cobblestone'),I('cobblestone'),I('cobblestone')], count:1 };
    JAVA_RECIPES.push(observer); BEDROCK_RECIPES.push(observer);
}

function setEdition(edition) {
    currentEdition = edition;
    document.querySelectorAll('.edition-btn').forEach(btn => {
        btn.classList.toggle('active', btn.innerText.toLowerCase().includes(edition));
    });
    renderGrid();
}

function renderGrid() {
    const gridEl = document.getElementById('recipeGrid');
    gridEl.innerHTML = '';
    
    const activeData = currentEdition === 'java' ? JAVA_RECIPES : BEDROCK_RECIPES;
    
    const filtered = activeData.filter(r => 
        (currentCat === 'All' || r.cat === currentCat) &&
        (!currentSearch || r.name.toLowerCase().includes(currentSearch))
    );

    if (filtered.length === 0) {
        gridEl.innerHTML = '<div class="no-results">😢 Không tìm thấy công thức cho phiên bản này</div>';
        return;
    }

    filtered.forEach(r => {
        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.innerHTML = `
            <div class="ed-tag">${currentEdition.toUpperCase()}</div>
            <img src="${r.icon}" onerror="this.src='${BLOCK_URL+r.id+'.png'}'" loading="lazy">
            <div style="font-weight:700;margin:8px 0 4px;font-size:0.85rem">${r.name}</div>
            <div style="font-size:0.7rem;color:#44ffaa;">${r.cat}</div>
        `;
        card.onclick = () => showModal(r);
        gridEl.appendChild(card);
    });
}

function showModal(r) {
    document.getElementById('modalTitle').textContent = r.name + ` (${currentEdition.toUpperCase()})`;
    document.getElementById('modalDesc').textContent = r.desc || '';
    document.getElementById('resultName').textContent = r.name;
    document.getElementById('resultCount').textContent = r.count > 1 ? r.count : '';
    
    const craftGrid = document.getElementById('craftGrid');
    craftGrid.innerHTML = '';
    for (let i = 0; i < 9; i++) {
        const slot = document.createElement('div');
        slot.className = 'craft-slot';
        if (r.grid[i]) {
            slot.innerHTML = `<img src="${r.grid[i].icon}" onerror="this.src='${BLOCK_URL+r.grid[i].id+'.png'}'">`;
        }
        craftGrid.appendChild(slot);
    }
    const resImg = document.getElementById('resultImg');
    resImg.src = r.icon;
    resImg.onerror = () => { resImg.src = BLOCK_URL + r.id + '.png'; };
    
    document.getElementById('modalOverlay').classList.add('active');
}

// Init Categories
const CATS = ['All','Build','Tools','Combat','Redstone','Misc'];
const catBox = document.getElementById('categories');
CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = `cat-btn ${c === 'All' ? 'active' : ''}`;
    btn.textContent = c;
    btn.onclick = () => {
        currentCat = c;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGrid();
    };
    catBox.appendChild(btn);
});

document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value.toLowerCase().trim();
    renderGrid();
});

document.getElementById('modalClose').onclick = () => document.getElementById('modalOverlay').classList.remove('active');

initData();
renderGrid();
</script>
</body>
</html>
