<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ Minecraft Crafting Recipes — Bedrock 1.21+</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
/* Giữ nguyên toàn bộ CSS cũ của bạn (tôi không thay đổi phần này để giữ giao diện) */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,#0a0a1f 0%,#15173a 50%,#1f2a44 100%);background-attachment:fixed;color:#f0f0ff;min-height:100vh;overflow-x:hidden;padding-bottom:40px;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(circle at 20% 30%,rgba(255,221,51,.08),transparent 40%),radial-gradient(circle at 80% 70%,rgba(120,255,150,.06),transparent 40%);}
img{image-rendering:pixelated;image-rendering:crisp-edges;}
header{position:relative;z-index:1;text-align:center;padding:50px 20px 30px;}
header h1{font-family:'Press Start 2P',monospace;font-size:clamp(1.4rem,4vw,2.4rem);color:#ffdd33;text-shadow:0 0 10px rgba(255,221,51,.5),3px 3px 0 #0a0a1f;margin-bottom:14px;letter-spacing:1px;animation:glow 3s ease-in-out infinite alternate;}
@keyframes glow{from{text-shadow:0 0 10px rgba(255,221,51,.5),3px 3px 0 #0a0a1f}to{text-shadow:0 0 20px rgba(255,221,51,.9),0 0 30px rgba(255,221,51,.4),3px 3px 0 #0a0a1f}}
header p.subtitle{font-size:clamp(.85rem,2vw,1.05rem);color:#b8ffd0;opacity:.9;letter-spacing:.5px;}
.search-wrap{position:relative;z-index:1;display:flex;justify-content:center;padding:10px 20px 25px;}
.search-box{width:100%;max-width:560px;position:relative;}
.search-box input{width:100%;padding:16px 22px 16px 52px;background:rgba(10,10,31,.7);border:2px solid rgba(255,221,51,.3);border-radius:50px;color:#fff;font-size:1rem;font-family:inherit;outline:none;transition:all .3s;backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,.3);}
.search-box input::placeholder{color:#8b8bb0}
.search-box input:focus{border-color:#ffdd33;box-shadow:0 0 0 4px rgba(255,221,51,.15),0 4px 25px rgba(255,221,51,.2);}
.search-box::before{content:"🔍";position:absolute;left:20px;top:50%;transform:translateY(-50%);font-size:1.2rem;}
.categories{position:relative;z-index:1;display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding:0 20px 30px;max-width:1200px;margin:0 auto;}
.cat-btn{padding:10px 18px;background:rgba(31,42,68,.6);border:2px solid rgba(255,221,51,.2);color:#f0f0ff;border-radius:25px;font-family:inherit;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .25s;backdrop-filter:blur(8px);}
.cat-btn:hover{background:rgba(255,221,51,.15);border-color:#ffdd33;transform:translateY(-2px);box-shadow:0 4px 15px rgba(255,221,51,.2);}
.cat-btn.active{background:linear-gradient(135deg,#ffdd33,#ffb700);color:#0a0a1f;border-color:#ffdd33;box-shadow:0 4px 20px rgba(255,221,51,.4);}
.grid-wrap{max-width:1400px;margin:0 auto;padding:0 20px;}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:18px;}
.recipe-card{background:linear-gradient(145deg,rgba(31,42,68,.7),rgba(15,23,42,.7));border:2px solid rgba(255,221,51,.15);border-radius:16px;padding:18px 12px;text-align:center;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(10px);position:relative;overflow:hidden;}
.recipe-card:hover{transform:translateY(-6px) scale(1.03);border-color:#ffdd33;box-shadow:0 10px 30px rgba(255,221,51,.25);}
.recipe-card .icon{width:64px;height:64px;margin:0 auto 12px;filter:drop-shadow(0 4px 6px rgba(0,0,0,.4));transition:transform .3s;}
.recipe-card:hover .icon{transform:scale(1.15) rotate(-5deg)}
.recipe-card .name{font-weight:700;font-size:.95rem;color:#fff;margin-bottom:4px;}
.recipe-card .cat{font-size:.75rem;color:#b8ffd0;opacity:.75;}
.no-results{text-align:center;padding:40px;color:#8b8bb0;font-size:1.1rem;grid-column:1/-1;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;opacity:0;transition:opacity .3s;}
.modal-overlay.active{display:flex;opacity:1}
.modal{background:linear-gradient(145deg,#1f2a44,#15173a);border:3px solid #ffdd33;border-radius:20px;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;padding:30px 25px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.modal-close{position:absolute;top:14px;right:14px;width:38px;height:38px;background:rgba(255,80,80,.2);border:2px solid rgba(255,80,80,.5);color:#ff8080;border-radius:50%;font-size:1.2rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:#ff5555;color:#fff;transform:rotate(90deg);}
.modal h2{font-family:'Press Start 2P',monospace;font-size:1.1rem;color:#ffdd33;margin-bottom:10px;}
.modal .desc{color:#b8ffd0;font-size:.95rem;margin-bottom:20px;line-height:1.5;}
.craft-grid{display:grid;grid-template-columns:repeat(3,56px);grid-template-rows:repeat(3,56px);gap:4px;padding:10px;background:linear-gradient(145deg,#5a3d22,#3d2814);border:3px solid #2a1a08;border-radius:8px;}
.craft-slot{width:56px;height:56px;background:linear-gradient(145deg,#1a1a2e,#0a0a1f);border:2px solid #000;border-radius:3px;display:flex;align-items:center;justify-content:center;position:relative;}
.craft-slot img{width:42px;height:42px}
.arrow{font-size:2.2rem;color:#ffdd33;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{50%{transform:scale(1.15)}}
.result-slot{width:80px;height:80px;background:linear-gradient(145deg,#1a1a2e,#0a0a1f);border:3px solid #ffdd33;border-radius:6px;display:flex;align-items:center;justify-content:center;}
.result-slot img{width:62px;height:62px;}
.audio-ctrl{position:fixed;bottom:20px;right:20px;z-index:50;width:50px;height:50px;border-radius:50%;background:rgba(31,42,68,.85);border:2px solid #ffdd33;color:#ffdd33;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<header>
  <h1>🛠️ Minecraft Crafting Recipes</h1>
  <p class="subtitle">1.21+ • Bedrock Edition</p>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm công thức... (vd: mace, sword, pickaxe)" />
  </div>
</div>

<div class="categories" id="categories"></div>

<div class="grid-wrap">
  <div class="recipe-grid" id="recipeGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h2 id="modalTitle"></h2>
    <p class="desc" id="modalDesc"></p>
    <div id="smithingNote"></div>
    <div class="craft-layout">
      <div class="craft-grid" id="craftGrid"></div>
      <div class="arrow">→</div>
      <div>
        <div class="result-slot">
          <img id="resultImg" src="" alt="" />
          <span class="count" id="resultCount"></span>
        </div>
      </div>
    </div>
    <div class="result-name" id="resultName"></div>
  </div>
</div>

<button class="audio-ctrl" id="audioCtrl" title="Bật/tắt nhạc">🔊</button>

<audio id="bgMusic" loop><source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_1718e3b7d8.mp3" type="audio/mpeg"></audio>
<audio id="clickSfx" preload="auto"><source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_478275f73e.mp3" type="audio/mpeg"></audio>

<script>
// ========== ICON SYSTEM - SỬA HOÀN CHỈNH ==========
const ICON_BASE = "https://minecraft.wiki/images/";

function icon(name) {
  const special = {
    mace: "Mace_JE1_BE1.png",
    heavy_core: "Heavy_Core_JE1_BE1.png",
    breeze_rod: "Breeze_Rod_JE1_BE1.png",
    netherite_upgrade_smithing_template: "Netherite_Upgrade_Smithing_Template_JE2_BE2.png"
  };
  if (special[name]) return ICON_BASE + special[name];

  let file = name.replace(/_/g, ' ')
                 .split(' ')
                 .map(w => w.charAt(0).toUpperCase() + w.slice(1))
                 .join('_') + ".png";
  return ICON_BASE + file;
}

const I = (n) => ({icon: icon(n), name: n});

let RECIPES = [];

// Mace - ĐÃ SỬA ĐÚNG CÔNG THỨC
RECIPES.push({
  id: 'mace',
  name: 'Mace',
  cat: 'Weapons',
  icon: icon('mace'),
  desc: 'Vũ khí mới trong 1.21 — Heavy Core + Breeze Rod. Sát thương cực lớn khi smash từ độ cao.',
  grid: [
    null, null, null,
    null, I('heavy_core'), null,
    null, I('breeze_rod'), null
  ],
  count: 1
});

// Wood family (giữ nguyên logic cũ)
const W = ['oak','spruce','birch','jungle','acacia','dark_oak','mangrove','cherry','bamboo','crimson','warped'];
const WOODS_LABEL = {oak:'Oak',spruce:'Spruce',birch:'Birch',jungle:'Jungle',acacia:'Acacia',dark_oak:'Dark Oak',mangrove:'Mangrove',cherry:'Cherry',bamboo:'Bamboo',crimson:'Crimson',warped:'Warped'};

W.forEach(w => {
  const lbl = WOODS_LABEL[w];
  const plk = I(w + '_planks');
  const logItem = I(w + '_log');

  RECIPES.push({id:w+'_planks',name:lbl+' Planks',cat:'Building',icon:icon(w+'_planks'),desc:`Chế từ ${lbl} Log.`,grid:[null,null,null,null,logItem,null,null,null,null],count:4});

  if(w === 'oak'){
    RECIPES.push({id:'stick',name:'Stick',cat:'Misc',icon:icon('stick'),desc:'2 planks → 4 sticks.',grid:[null,plk,null,null,plk,null,null,null,null],count:4});
    RECIPES.push({id:'crafting_table',name:'Crafting Table',cat:'Misc',icon:icon('crafting_table'),desc:'4 planks bất kỳ.',grid:[plk,plk,null,plk,plk,null,null,null,null],count:1});
  }

  RECIPES.push({id:w+'_door',name:lbl+' Door',cat:'Building',icon:icon(w+'_door'),desc:`Cửa ${lbl}.`,grid:[plk,plk,null,plk,plk,null,plk,plk,null],count:3});
  RECIPES.push({id:w+'_trapdoor',name:lbl+' Trapdoor',cat:'Building',icon:icon(w+'_trapdoor'),desc:`Cửa sập ${lbl}.`,grid:[plk,plk,plk,plk,plk,plk,null,null,null],count:2});
  RECIPES.push({id:w+'_slab',name:lbl+' Slab',cat:'Building',icon:icon(w+'_slab'),desc:`Slab ${lbl}.`,grid:[null,null,null,null,null,null,plk,plk,plk],count:6});
  RECIPES.push({id:w+'_stairs',name:lbl+' Stairs',cat:'Building',icon:icon(w+'_stairs'),desc:`Cầu thang ${lbl}.`,grid:[plk,null,null,plk,plk,null,plk,plk,plk],count:4});
});

// Thêm một số recipe quan trọng khác (Tools, Sword, v.v.)
const stick = I('stick');
const toolMats = [
  {key:'wooden', mat:I('oak_planks'), lbl:'Wooden'},
  {key:'stone', mat:I('cobblestone'), lbl:'Stone'},
  {key:'iron', mat:I('iron_ingot'), lbl:'Iron'}
];

toolMats.forEach(t => {
  RECIPES.push({id:t.key+'_sword',name:t.lbl+' Sword',cat:'Weapons',icon:icon(t.key+'_sword'),desc:`Kiếm ${t.lbl}.`,grid:[null,t.mat,null,null,t.mat,null,null,stick,null],count:1});
  RECIPES.push({id:t.key+'_pickaxe',name:t.lbl+' Pickaxe',cat:'Tools',icon:icon(t.key+'_pickaxe'),desc:`Cuốc ${t.lbl}.`,grid:[t.mat,t.mat,t.mat,null,stick,null,null,stick,null],count:1});
});

// ========== RENDER & MODAL ==========
const CATS = ['All','Building','Tools','Weapons','Armor','Food','Redstone','Transportation','Decoration','Misc'];
let currentCat = 'All';
let currentSearch = '';

const catContainer = document.getElementById('categories');
CATS.forEach(c => {
  const b = document.createElement('button');
  b.className = `cat-btn ${c==='All' ? 'active' : ''}`;
  b.textContent = c;
  b.onclick = () => {
    currentCat = c;
    document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    renderGrid();
  };
  catContainer.appendChild(b);
});

const grid = document.getElementById('recipeGrid');

function renderGrid() {
  grid.innerHTML = '';
  const filtered = RECIPES.filter(r => {
    const catOk = currentCat === 'All' || r.cat === currentCat;
    const searchOk = !currentSearch || r.name.toLowerCase().includes(currentSearch);
    return catOk && searchOk;
  });

  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">😢 Không tìm thấy công thức nào.</div>';
    return;
  }

  filtered.forEach(r => {
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.innerHTML = `
      <img class="icon" src="${r.icon}" onerror="this.src='https://minecraft.wiki/images/Barrier_JE2_BE2.png'">
      <div class="name">${r.name}</div>
      <div class="cat">${r.cat}</div>`;
    card.onclick = () => openModal(r);
    grid.appendChild(card);
  });
}

function openModal(r) {
  document.getElementById('modalTitle').textContent = r.name;
  document.getElementById('modalDesc').textContent = r.desc;
  document.getElementById('resultName').textContent = r.name;
  document.getElementById('resultCount').textContent = r.count > 1 ? r.count : '';

  const craftGridEl = document.getElementById('craftGrid');
  craftGridEl.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const slot = document.createElement('div');
    slot.className = 'craft-slot';
    const item = r.grid[i];
    if (item) {
      slot.innerHTML = `<img src="${item.icon}" onerror="this.src='https://minecraft.wiki/images/Barrier_JE2_BE2.png'">`;
    }
    craftGridEl.appendChild(slot);
  }

  const resultImg = document.getElementById('resultImg');
  resultImg.src = r.icon;
  resultImg.onerror = () => { resultImg.src = 'https://minecraft.wiki/images/Barrier_JE2_BE2.png'; };

  document.getElementById('modalOverlay').classList.add('active');
}

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value.trim().toLowerCase();
  renderGrid();
});

// Close modal
document.getElementById('modalClose').onclick = () => document.getElementById('modalOverlay').classList.remove('active');
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('active');
});

// Audio (giữ nguyên)
const audioCtrl = document.getElementById('audioCtrl');
let audioOn = false;
audioCtrl.onclick = () => {
  audioOn = !audioOn;
  audioCtrl.textContent = audioOn ? '🔊' : '🔇';
};

// Init
renderGrid();
window.addEventListener('load', () => {
  const mace = RECIPES.find(r => r.id === 'mace');
  if (mace) openModal(mace);
});
</script>
</body>
</html>
