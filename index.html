<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MC Recipe Pro — Bedrock 1.21+</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1f">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/item/crafting_table.png">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none;}
  html{scroll-behavior:smooth;overflow-x:hidden;}
  body{font-family:'Quicksand',sans-serif;background:#0a0a1f;color:#f0f0ff;min-height:100vh;padding-bottom:100px;overflow-x:hidden;}
  
  header{text-align:center;padding:50px 20px 20px;background:linear-gradient(to bottom, #15173a, transparent);}
  header h1{font-family:'Press Start 2P',monospace;font-size:clamp(1.2rem,4vw,2.2rem);color:#ffdd33;text-shadow:4px 4px 0px #3d2814;margin-bottom:10px;}
  
  .search-wrap{position:sticky;top:0;z-index:90;padding:15px;background:rgba(10,10,31,0.9);backdrop-filter:blur(10px);}
  .search-box{max-width:600px;margin:0 auto;}
  .search-box input{width:100%;padding:18px 25px;background:#1f2a44;border:2px solid #ffdd33;border-radius:15px;color:#fff;font-size:1rem;box-shadow:0 4px 15px rgba(0,0,0,0.3);}

  .categories{display:flex;overflow-x:auto;gap:10px;padding:15px 10px;scrollbar-width:none;}
  .categories::-webkit-scrollbar{display:none;}
  .cat-btn{padding:10px 20px;background:#1f2a44;border:1px solid #ffdd33;color:#fff;border-radius:12px;white-space:nowrap;cursor:pointer;font-weight:700;}
  .cat-btn.active{background:#ffdd33;color:#0a0a1f;}

  .recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;padding:15px;max-width:1200px;margin:0 auto;}
  .recipe-card{background:#1f2a44;border-radius:12px;padding:15px;text-align:center;transition:0.2s;border:1px solid rgba(255,221,51,0.2);}
  .recipe-card:active{transform:scale(0.95);}
  .recipe-card img{width:64px;height:64px;image-rendering:pixelated;margin-bottom:10px;}
  .recipe-card div{font-size:0.85rem;font-weight:bold;}

  /* Modal System */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .modal-overlay.active{display:flex;}
  .modal{background:#2a2a2a;border:4px solid #7a7a7a;border-radius:4px;width:100%;max-width:400px;padding:20px;position:relative;box-shadow:0 0 0 4px #000;}
  
  .craft-grid-container{background:#c6c6c6;padding:15px;border:3px solid #000;border-radius:2px;margin:20px 0;}
  .craft-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:fit-content;margin:0 auto;}
  .craft-slot{width:56px;height:56px;background:#8b8b8b;border:3px solid;border-color:#373737 #fff #fff #373737;display:flex;align-items:center;justify-content:center;}
  .craft-slot img{width:48px;height:48px;image-rendering:pixelated;}
  
  .arrow-down{text-align:center;font-size:2rem;color:#ffdd33;margin:10px 0;}
  
  .result-area{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .result-box{width:72px;height:72px;background:#8b8b8b;border:3px solid;border-color:#373737 #fff #fff #373737;display:flex;align-items:center;justify-content:center;position:relative;}
  .result-box img{width:56px;height:56px;image-rendering:pixelated;}
  .result-count{position:absolute;bottom:2px;right:4px;color:#fff;text-shadow:2px 2px 0 #000;font-family:'Press Start 2P';font-size:12px;}
  
  .close-btn{position:absolute;top:-15px;right:-15px;width:40px;height:40px;background:#ff4444;border:3px solid #fff;border-radius:50%;color:#fff;font-weight:bold;cursor:pointer;}
</style>
</head>
<body>

<header>
  <h1>MC RECIPE PRO</h1>
  <p style="color:#ffdd33; letter-spacing:1px; font-size: 0.8rem;">BEDROCK EDITION 1.21.11</p>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm tên vật phẩm..." autocomplete="off">
  </div>
</div>

<div class="categories" id="catBar"></div>
<div class="recipe-grid" id="mainGrid"></div>

<div class="modal-overlay" id="overlay">
  <div class="modal">
    <button class="close-btn" id="closeBtn">X</button>
    <h3 id="mTitle" style="text-align:center;margin-bottom:10px;font-family:'Press Start 2P';font-size:0.7rem;color:#fff"></h3>
    
    <div class="craft-grid-container">
      <div class="craft-grid" id="mGrid"></div>
    </div>

    <div class="result-area">
      <div class="arrow-down">▼</div>
      <div class="result-box">
        <img id="mResultImg" src="">
        <span class="result-count" id="mCount"></span>
      </div>
      <div id="mResultName" style="color:#fff;font-weight:bold;"></div>
    </div>
  </div>
</div>

<script>
const ASSET_PATH = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/";
const getImg = (id, type='item') => `${ASSET_PATH}${type}/${id}.png`;

// Cấu trúc dữ liệu tối ưu cho Bedrock
const RECIPES = [
  // 1.21 NEW
  { id:'mace', name:'Mace', cat:'Combat', icon: getImg('mace'), grid: [null,null,null,null,'heavy_core',null,null,'breeze_rod',null], count: 1 },
  { id:'heavy_core', name:'Heavy Core', cat:'Misc', icon: getImg('heavy_core','block'), grid: [], desc:'Tìm thấy trong Trial Chambers' },
  
  // Basic
  { id:'crafting_table', name:'Crafting Table', cat:'Build', icon: getImg('crafting_table_top','block'), grid: [null,null,null,null,'oak_planks','oak_planks',null,'oak_planks','oak_planks'], count: 1 },
  { id:'stick', name:'Stick', cat:'Tools', icon: getImg('stick'), grid: [null,'oak_planks',null,null,'oak_planks',null,null,null,null], count: 4 },
  { id:'torch', name:'Torch', cat:'Misc', icon: getImg('torch','block'), grid: [null,'coal',null,null,'stick',null,null,null,null], count: 4 },
  
  // Combat
  { id:'shield', name:'Shield', cat:'Combat', icon: getImg('shield_base'), grid: ['oak_planks','iron_ingot','oak_planks','oak_planks','oak_planks','oak_planks',null,'oak_planks',null], count: 1 },
  { id:'sword_iron', name:'Iron Sword', cat:'Combat', icon: getImg('iron_sword'), grid: [null,'iron_ingot',null,null,'iron_ingot',null,null,'stick',null], count: 1 },
  { id:'bow', name:'Bow', cat:'Combat', icon: getImg('bow_standby'), grid: [null,'stick','string','stick',null,'string',null,'stick','string'], count: 1 },

  // Bedrock Specific: Boat (No shovel)
  { id:'oak_boat', name:'Oak Boat', cat:'Misc', icon: getImg('oak_boat'), grid: [null,null,null,'oak_planks',null,'oak_planks','oak_planks','oak_planks','oak_planks'], count: 1 },
  
  // Redstone
  { id:'observer', name:'Observer', cat:'Redstone', icon: getImg('observer_front','block'), grid: ['cobblestone','cobblestone','cobblestone','redstone','redstone','quartz','cobblestone','cobblestone','cobblestone'], count: 1 },
  { id:'piston', name:'Piston', cat:'Redstone', icon: getImg('piston_side','block'), grid: ['oak_planks','oak_planks','oak_planks','cobblestone','iron_ingot','cobblestone','cobblestone','redstone','cobblestone'], count: 1 },
  { id:'hopper', name:'Hopper', cat:'Redstone', icon: getImg('hopper'), grid: ['iron_ingot',null,'iron_ingot','iron_ingot','chest','iron_ingot',null,'iron_ingot',null], count: 1 }
];

// Helper: Tự động tạo công thức công cụ gỗ/đá/sắt/vàng/kim cương
const mats = ['wooden','stone','iron','golden','diamond'];
const ing = ['oak_planks','cobblestone','iron_ingot','gold_ingot','diamond'];
mats.forEach((m, i) => {
  RECIPES.push({ id:`${m}_pickaxe`, name:`${m.toUpperCase()} Pickaxe`, cat:'Tools', icon: getImg(`${m}_pickaxe`), grid:[ing[i],ing[i],ing[i],null,'stick',null,null,'stick',null], count:1 });
});

let currentCat = 'All';
const cats = ['All', 'Build', 'Tools', 'Combat', 'Redstone', 'Misc'];

function init() {
  renderCats();
  renderGrid();
  
  document.getElementById('searchInput').addEventListener('input', renderGrid);
  document.getElementById('closeBtn').onclick = () => document.getElementById('overlay').classList.remove('active');
}

function renderCats() {
  const bar = document.getElementById('catBar');
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = `cat-btn ${c === currentCat ? 'active' : ''}`;
    btn.innerText = c;
    btn.onclick = () => {
      currentCat = c;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    };
    bar.appendChild(btn);
  });
}

function renderGrid() {
  const grid = document.getElementById('mainGrid');
  const term = document.getElementById('searchInput').value.toLowerCase();
  grid.innerHTML = '';

  const filtered = RECIPES.filter(r => 
    (currentCat === 'All' || r.cat === currentCat) && 
    (r.name.toLowerCase().includes(term))
  );

  filtered.forEach(r => {
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.innerHTML = `<img src="${r.icon}"><div>${r.name}</div>`;
    card.onclick = () => openModal(r);
    grid.appendChild(card);
  });
}

function openModal(r) {
  document.getElementById('mTitle').innerText = r.name;
  document.getElementById('mResultName').innerText = r.name;
  document.getElementById('mResultImg').src = r.icon;
  document.getElementById('mCount').innerText = r.count > 1 ? r.count : '';
  
  const mGrid = document.getElementById('mGrid');
  mGrid.innerHTML = '';
  
  if(r.grid.length === 0) {
    mGrid.innerHTML = '<p style="grid-column:1/4;text-align:center;color:#333;font-size:0.8rem;">Vật phẩm này không thể chế tạo trực tiếp.</p>';
  } else {
    r.grid.forEach(slot => {
      const div = document.createElement('div');
      div.className = 'craft-slot';
      if(slot) {
        // Tự động nhận diện block hay item để lấy ảnh
        const isBlock = ['cobblestone','oak_planks','chest','quartz','heavy_core'].includes(slot);
        div.innerHTML = `<img src="${getImg(slot, isBlock ? 'block' : 'item')}">`;
      }
      mGrid.appendChild(div);
    });
  }
  
  document.getElementById('overlay').classList.add('active');
}

window.onload = init;
</script>
</body>
</html>
