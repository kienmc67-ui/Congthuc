<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ TỪ ĐIỂN CHẾ TẠO MINECRAFT | ULTIMATE EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
<style>
    :root { 
        --primary: #44ffaa; 
        --accent: #ffdd33; 
        --bg: #0a0a1f; 
        --card-bg: rgba(31,42,68,0.6);
        --modal-bg: #1f2a44;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg, var(--bg), #15173a);color:#f0f0ff;min-height:100vh;padding-bottom:50px;}
    
    /* Header & Search */
    header{text-align:center;padding:40px 20px 20px;background:radial-gradient(circle at top, rgba(68,255,170,0.1) 0%, transparent 70%);}
    header h1{font-family:'Press Start 2P',monospace;font-size:clamp(1.2rem,4vw,2.2rem);color:var(--accent);text-shadow:0 5px 15px rgba(255,221,51,0.4);letter-spacing:1px;line-height:1.4;}
    
    .search-wrap{position:sticky;top:0;z-index:100;background:rgba(10,10,31,0.9);backdrop-filter:blur(10px);padding:15px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05);}
    .search-box input{width:100%;max-width:650px;padding:18px 25px;background:rgba(0,0,0,0.5);border:2px solid var(--primary);border-radius:50px;color:#fff;font-size:1.1rem;font-weight:700;outline:none;transition:0.3s;box-shadow:0 0 20px rgba(68,255,170,0.1);}
    .search-box input:focus{box-shadow:0 0 30px rgba(68,255,170,0.3);transform:scale(1.02);}

    /* Categories */
    .categories{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding:25px 15px;}
    .cat-btn{padding:10px 22px;background:var(--card-bg);border:2px solid transparent;color:#aaa;border-radius:30px;font-weight:700;cursor:pointer;transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);}
    .cat-btn:hover{color:#fff;background:rgba(68,255,170,0.2);}
    .cat-btn.active{background:var(--primary);color:#000;box-shadow:0 0 15px rgba(68,255,170,0.5);}

    /* Grid layout */
    .recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;padding:0 20px;max-width:1300px;margin:0 auto;}
    .recipe-card{background:var(--card-bg);border:1px solid rgba(255,255,255,0.05);border-radius:16px;padding:15px;text-align:center;cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden;}
    .recipe-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);transform:translateX(-100%);transition:0.5s;}
    .recipe-card:hover::before{transform:translateX(100%);}
    .recipe-card:hover{transform:translateY(-8px);border-color:var(--accent);box-shadow:0 10px 25px rgba(255,221,51,0.2);background:rgba(31,42,68,0.9);}
    
    .recipe-card img{width:64px;height:64px;image-rendering:pixelated;margin-bottom:12px;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.5));}
    .recipe-name{font-size:0.85rem;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.5px;}
    .recipe-cat{font-size:0.7rem;color:var(--primary);margin-top:5px;font-weight:700;}
    .no-results{grid-column:1/-1;text-align:center;padding:60px;color:#888;font-size:1.2rem;font-weight:700;}

    /* Modal (UI Chế tạo) */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;z-index:1000;opacity:0;transition:opacity 0.3s;}
    .modal-overlay.active{display:flex;opacity:1;}
    .modal{background:var(--modal-bg);border:3px solid var(--accent);border-radius:24px;width:90%;max-width:480px;padding:30px 20px;position:relative;transform:scale(0.8);transition:transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);box-shadow:0 20px 50px rgba(0,0,0,0.5);}
    .modal-overlay.active .modal{transform:scale(1);}
    
    .modal-close{position:absolute;top:15px;right:15px;width:40px;height:40px;background:rgba(255,80,80,0.1);color:#ff5555;border:2px solid #ff5555;border-radius:50%;font-size:1.5rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.2s;}
    .modal-close:hover{background:#ff5555;color:#fff;transform:rotate(90deg);}

    .craft-area{display:flex;flex-direction:column;align-items:center;margin-top:20px;}
    .craft-grid{display:grid;grid-template-columns:repeat(3,56px);gap:6px;background:#3d2814;padding:12px;border:4px solid #2a1a08;border-radius:8px;box-shadow:inset 0 0 10px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.4);}
    .craft-slot{width:56px;height:56px;background:#8b8b8b;border-top:3px solid #373737;border-left:3px solid #373737;border-bottom:3px solid #fff;border-right:3px solid #fff;display:flex;align-items:center;justify-content:center;}
    .craft-slot img{width:48px;height:48px;image-rendering:pixelated;filter:drop-shadow(2px 2px 0 rgba(0,0,0,0.3));}
    
    .result-arrow{font-size:2.5rem;color:var(--primary);margin:15px 0;animation:bounce 1.5s infinite;}
    @keyframes bounce { 0%, 100%{transform:translateY(0);} 50%{transform:translateY(10px);} }
    
    .result-slot{width:90px;height:90px;background:#8b8b8b;border:4px solid var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:0 10px 20px rgba(255,221,51,0.2);}
    .result-slot img{width:70px;height:70px;image-rendering:pixelated;filter:drop-shadow(3px 3px 0 rgba(0,0,0,0.4));}
    .result-slot .count{position:absolute;bottom:5px;right:8px;font-family:'Press Start 2P';font-size:1.1rem;color:#fff;text-shadow:2px 2px 0 #000;}
</style>
</head>
<body>

<header>
  <h1>MINECRAFT CRAFTING<br><span style="color:#fff;font-size:1rem;font-family:'Quicksand'">ULTIMATE ENCYCLOPEDIA</span></h1>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm tên đồ vật (Vd: sword, bed, tnt, mace...)" autocomplete="off"/>
  </div>
</div>

<div class="categories" id="catBox"></div>
<div class="recipe-grid" id="recipeGrid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h2 id="mTitle" style="color:var(--accent);text-align:center;font-family:'Press Start 2P';font-size:1.1rem;line-height:1.5;"></h2>
    <div class="craft-area">
      <div class="craft-grid" id="mGrid"></div>
      <div class="result-arrow">↓</div>
      <div class="result-slot">
        <img id="mResImg" src="">
        <span class="count" id="mCount"></span>
      </div>
      <div id="mResName" style="margin-top:15px;color:var(--primary);font-weight:900;font-size:1.2rem;text-transform:uppercase;"></div>
    </div>
  </div>
</div>

<script>
// ================= HỆ THỐNG URL ẢNH THÔNG MINH =================
const URL_ITEM = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/item/";
const URL_BLOCK = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/block/";
const URL_WIKI = "https://minecraft.wiki/images/Invicon_";

function getImg(id) { return { id: id, url: URL_ITEM + id + ".png" }; }

// Thuật toán Fix ảnh 3 lớp: Item -> Block -> Wiki -> Barrier
function smartImageFallback(img, id) {
    let attempts = parseInt(img.dataset.retry || '0');
    if (attempts === 0) {
        img.dataset.retry = '1';
        img.src = URL_BLOCK + id + ".png"; // Thử tìm trong kho Block
    } else if (attempts === 1) {
        img.dataset.retry = '2';
        let wikiName = id.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join('_');
        img.src = URL_WIKI + wikiName + ".png"; // Thử tìm trên Wiki
    } else {
        img.src = "https://minecraft.wiki/images/Invicon_Barrier.png"; // Đầu hàng
    }
}

// ================= KHO DỮ LIỆU TỰ ĐỘNG SINH =================
let MASTER_DB = [];

function generateDatabase() {
    const s = getImg('stick');
    const plk = getImg('oak_planks');
    const cob = getImg('cobblestone');
    const iro = getImg('iron_ingot');
    const red = getImg('redstone');

    // 1. Redstone & Cơ chế đặc biệt
    MASTER_DB.push(
        {id:'mace', cat:'Combat', g:[null,null,null, null,getImg('heavy_core'),null, null,getImg('breeze_rod'),null], qty:1},
        {id:'crafter', cat:'Redstone', g:[iro,iro,iro, iro,getImg('crafting_table'),iro, red,getImg('dropper'),red], qty:1},
        {id:'tnt', cat:'Combat', g:[getImg('gunpowder'),getImg('sand'),getImg('gunpowder'), getImg('sand'),getImg('gunpowder'),getImg('sand'), getImg('gunpowder'),getImg('sand'),getImg('gunpowder')], qty:1},
        {id:'observer', cat:'Redstone', g:[cob,cob,cob, red,red,getImg('quartz'), cob,cob,cob], qty:1},
        {id:'piston', cat:'Redstone', g:[plk,plk,plk, cob,iro,cob, cob,red,cob], qty:1},
        {id:'shield', cat:'Combat', g:[plk,iro,plk, plk,plk,plk, null,plk,null], qty:1},
        {id:'firework_rocket', cat:'Misc', g:[getImg('paper'),null,null, getImg('gunpowder'),null,null, null,null,null], qty:3},
        {id:'chest', cat:'Build', g:[plk,plk,plk, plk,null,plk, plk,plk,plk], qty:1},
        {id:'furnace', cat:'Build', g:[cob,cob,cob, cob,null,cob, cob,cob,cob], qty:1}
    );

    // 2. Generator cho Công cụ & Giáp
    const mats = [
        {prefix:'wooden', mat:plk}, {prefix:'stone', mat:cob},
        {prefix:'iron', mat:iro}, {prefix:'golden', mat:getImg('gold_ingot')},
        {prefix:'diamond', mat:getImg('diamond')}
    ];
    mats.forEach(m => {
        let mat = m.mat;
        MASTER_DB.push(
            {id:m.prefix+'_sword', cat:'Combat', g:[null,mat,null, null,mat,null, null,s,null], qty:1},
            {id:m.prefix+'_pickaxe', cat:'Tools', g:[mat,mat,mat, null,s,null, null,s,null], qty:1},
            {id:m.prefix+'_axe', cat:'Tools', g:[mat,mat,null, mat,s,null, null,s,null], qty:1},
            {id:m.prefix+'_chestplate', cat:'Armor', g:[mat,null,mat, mat,mat,mat, mat,mat,mat], qty:1}
        );
    });

    // 3. Generator cho Hệ sinh thái gỗ (Chỉ 1 vòng lặp tạo ra hàng trăm công thức)
    const woods = ['oak','spruce','birch','jungle','cherry','mangrove','dark_oak'];
    woods.forEach(w => {
        const wp = getImg(w+'_planks');
        const wl = getImg(w+'_log');
        MASTER_DB.push(
            {id:w+'_planks', cat:'Build', g:[wl,null,null, null,null,null, null,null,null], qty:4},
            {id:w+'_door', cat:'Build', g:[wp,wp,null, wp,wp,null, wp,wp,null], qty:3},
            {id:w+'_boat', cat:'Misc', g:[null,null,null, wp,null,wp, wp,wp,wp], qty:1},
            {id:w+'_fence', cat:'Build', g:[null,null,null, wp,s,wp, wp,s,wp], qty:3}
        );
    });
}

// ================= RENDER LOGIC (CỰC MƯỢT) =================
let currentCat = 'All';
const CATS = ['All','Build','Combat','Tools','Armor','Redstone','Misc'];
const gridEl = document.getElementById('recipeGrid');

// Tạo menu danh mục
CATS.forEach(c => {
    let btn = document.createElement('button');
    btn.className = 'cat-btn' + (c==='All' ? ' active' : '');
    btn.innerText = c;
    btn.onclick = () => {
        currentCat = c;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGrid();
    };
    document.getElementById('catBox').appendChild(btn);
});

// Render danh sách (Dùng DocumentFragment để chống Lag)
function renderGrid() {
    gridEl.innerHTML = '';
    const searchStr = document.getElementById('searchInput').value.toLowerCase().trim();
    
    const filtered = MASTER_DB.filter(r => 
        (currentCat === 'All' || r.cat === currentCat) && 
        r.id.replace(/_/g, ' ').includes(searchStr)
    );

    if(filtered.length === 0) {
        gridEl.innerHTML = '<div class="no-results">Túi đồ rỗng! Không tìm thấy vật phẩm 😢</div>';
        return;
    }

    const fragment = document.createDocumentFragment();
    filtered.forEach(r => {
        const card = document.createElement('div');
        card.className = 'recipe-card';
        // Hiển thị ảnh của vật phẩm đầu tiên trong công thức đại diện (hoặc chính nó)
        card.innerHTML = `
            <img src="${getImg(r.id).url}" onerror="smartImageFallback(this, '${r.id}')" loading="lazy">
            <div class="recipe-name">${r.id.replace(/_/g, ' ')}</div>
            <div class="recipe-cat">${r.cat}</div>
        `;
        card.onclick = () => openModal(r);
        fragment.appendChild(card);
    });
    gridEl.appendChild(fragment);
}

// ================= XỬ LÝ SỰ KIỆN & CHỐNG LAG TÌM KIẾM =================
// Kỹ thuật Debounce: Chỉ tìm kiếm khi ngừng gõ 300ms
let debounceTimer;
document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(renderGrid, 300);
});

// Modal Logic
const modalOverlay = document.getElementById('modalOverlay');
function openModal(r) {
    document.getElementById('mTitle').innerText = r.id.replace(/_/g, ' ').toUpperCase();
    document.getElementById('mResName').innerText = r.id.replace(/_/g, ' ');
    document.getElementById('mCount').innerText = r.qty > 1 ? r.qty : '';
    
    let resImg = document.getElementById('mResImg');
    resImg.dataset.retry = "0"; // Reset bộ đếm lỗi
    resImg.src = getImg(r.id).url;
    resImg.onerror = () => smartImageFallback(resImg, r.id);

    const mGrid = document.getElementById('mGrid');
    mGrid.innerHTML = '';
    r.g.forEach(slot => {
        let div = document.createElement('div');
        div.className = 'craft-slot';
        if(slot) {
            div.innerHTML = `<img src="${slot.url}" onerror="smartImageFallback(this, '${slot.id}')">`;
        }
        mGrid.appendChild(div);
    });

    modalOverlay.classList.add('active');
}

document.getElementById('modalClose').onclick = () => modalOverlay.classList.remove('active');
modalOverlay.addEventListener('click', e => {
    if(e.target === modalOverlay) modalOverlay.classList.remove('active');
});

// Khởi chạy
generateDatabase();
renderGrid();
</script>
</body>
</html>
