<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ Minecraft Crafting Guide — Fixed 1.21.11</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,#0a0a1f,#15173a,#1f2a44);color:#f0f0ff;min-height:100vh;padding-bottom:80px;}
header{text-align:center;padding:40px 20px 20px;}
header h1{font-family:'Press Start 2P',monospace;font-size:clamp(1.2rem,4vw,2.2rem);color:#ffdd33;text-shadow:0 0 15px rgba(255,221,51,.6);}
.search-wrap{padding:10px 20px 20px;text-align:center;}
.search-box input{width:100%;max-width:500px;padding:14px 25px;background:rgba(10,10,31,.85);border:2px solid #ffdd33;border-radius:50px;color:#fff;outline:none;}
.categories{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:0 15px 25px;}
.cat-btn{padding:8px 16px;background:rgba(31,42,68,.75);border:2px solid rgba(255,221,51,.3);color:#fff;border-radius:30px;cursor:pointer;font-weight:700;}
.cat-btn.active{background:#ffdd33;color:#0a0a1f;border-color:#ffdd33;}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:15px;padding:0 15px;max-width:1200px;margin:0 auto;}
.recipe-card{background:rgba(31,42,68,.85);border:2px solid rgba(255,221,51,.25);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:.2s;}
.recipe-card:hover{transform:scale(1.05);border-color:#ffdd33;}
.recipe-card img{width:64px;height:64px;image-rendering:pixelated;margin-bottom:8px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:100;padding:15px;}
.modal-overlay.active{display:flex;}
.modal{background:#1f2a44;border:3px solid #ffdd33;border-radius:18px;width:100%;max-width:450px;padding:25px;position:relative;}
.modal-close{position:absolute;top:10px;right:10px;background:none;border:none;color:#ff8080;font-size:1.5rem;cursor:pointer;}
.craft-grid{display:grid;grid-template-columns:repeat(3,50px);gap:5px;margin:20px auto;background:#3d2814;padding:10px;border:4px solid #2a1a08;width:fit-content;}
.slot{width:50px;height:50px;background:#8b8b8b;border:2px solid #373737;display:flex;align-items:center;justify-content:center;}
.slot img{width:40px;height:40px;image-rendering:pixelated;}
.result-box{text-align:center;margin-top:15px;}
.result-slot{width:70px;height:70px;background:#8b8b8b;border:3px solid #ffdd33;margin:0 auto;display:flex;align-items:center;justify-content:center;position:relative;}
.result-slot img{width:55px;height:55px;image-rendering:pixelated;}
.count{position:absolute;bottom:2px;right:5px;font-family:'Press Start 2P';font-size:0.8rem;color:#fff;text-shadow:1px 1px #000;}
</style>
</head>
<body>

<header>
  <h1>🛠️ Minecraft Recipes</h1>
  <p style="color:#b8ffd0;">Bedrock 1.21.11 • Image Fixed</p>
</header>

<div class="search-wrap">
  <div class="search-box"><input type="text" id="search" placeholder="Tìm mace, sword, door..." /></div>
</div>

<div class="categories" id="cats"></div>
<div class="recipe-grid" id="grid"></div>

<div class="modal-overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="mTitle" style="text-align:center;color:#ffdd33;margin-bottom:15px;"></h2>
    <div class="craft-grid" id="mGrid"></div>
    <div style="text-align:center;font-size:1.5rem;margin:10px;">↓</div>
    <div class="result-box">
      <div class="result-slot">
        <img id="mResultImg" src=""><span class="count" id="mCount"></span>
      </div>
      <p id="mName" style="margin-top:10px;font-weight:700;color:#ffdd33;"></p>
    </div>
  </div>
</div>

<script>
const ITEM_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/item/";
const BLOCK_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/block/";

// Hàm sửa lỗi ảnh - Thử tìm trong block nếu item không có
function fixImg(img, id) {
  const step = parseInt(img.dataset.step || 0);
  const fallbacks = [
    BLOCK_URL + id + ".png",
    BLOCK_URL + id + "_top.png",
    BLOCK_URL + id + "_front.png",
    BLOCK_URL + id + "_side.png",
    BLOCK_URL + id + "_bottom.png",
    BLOCK_URL + id.replace('_planks', '') + "_planks.png",
    ITEM_URL + "barrier.png" // Cuối cùng mới hiện barrier
  ];
  if (step < fallbacks.length) {
    img.dataset.step = step + 1;
    img.src = fallbacks[step];
  }
}

const I = id => ({ id, icon: ITEM_URL + id + ".png", name: id.split('_').map(s=>s[0].toUpperCase()+s.slice(1)).join(' ') });
let RECIPES = [];

// Items cơ bản
RECIPES.push({ id:'mace', name:'Mace', cat:'Combat', icon: ITEM_URL+'mace.png', grid:[null,null,null,null,I('heavy_core'),null,null,I('breeze_rod'),null], count:1 });
const sticks = I('stick');

// Tự động sinh Tools/Armor
const mats = [{p:'wooden', m:I('oak_planks')}, {p:'stone', m:I('cobblestone')}, {p:'iron', m:I('iron_ingot')}, {p:'golden', m:I('gold_ingot')}, {p:'diamond', m:I('diamond')}];
mats.forEach(t => {
  RECIPES.push({ id:t.p+'_sword', name:t.p+' Sword', cat:'Combat', icon:ITEM_URL+t.p+'_sword.png', grid:[null,t.m,null,null,t.m,null,null,sticks,null], count:1 });
  RECIPES.push({ id:t.p+'_pickaxe', name:t.p+' Pickaxe', cat:'Tools', icon:ITEM_URL+t.p+'_pickaxe.png', grid:[t.m,t.m,t.m,null,sticks,null,null,sticks,null], count:1 });
});

// Tự động sinh gỗ (Fix lỗi hiển thị stairs/slabs)
const woods = ['oak','spruce','birch','jungle','acacia','dark_oak','mangrove','cherry'];
woods.forEach(w => {
  const p = I(w+'_planks');
  const s = sticks;
  RECIPES.push({ id:w+'_planks', name:w+' Planks', cat:'Build', icon:BLOCK_URL+w+'_planks.png', grid:[null,null,null,null,I(w+'_log'),null,null,null,null], count:4 });
  RECIPES.push({ id:w+'_stairs', name:w+' Stairs', cat:'Build', icon:BLOCK_URL+w+'_stairs.png', grid:[p,null,null,p,p,null,p,p,p], count:4 });
  RECIPES.push({ id:w+'_slab', name:w+' Slab', cat:'Build', icon:BLOCK_URL+w+'_slab.png', grid:[null,null,null,p,p,p,null,null,null], count:6 });
  RECIPES.push({ id:w+'_fence', name:w+' Fence', cat:'Build', icon:BLOCK_URL+w+'_fence.png', grid:[null,null,null,p,s,p,p,s,p], count:3 });
  RECIPES.push({ id:w+'_door', name:w+' Door', cat:'Build', icon:ITEM_URL+w+'_door.png', grid:[p,p,null,p,p,null,p,p,null], count:3 });
});

// Logic UI
let currentCat = 'All';
const cats = ['All','Build','Tools','Combat','Misc'];
const catDiv = document.getElementById('cats');
cats.forEach(c => {
  const b = document.createElement('button');
  b.className = 'cat-btn' + (c==='All'?' active':'');
  b.textContent = c;
  b.onclick = () => {
    currentCat = c;
    document.querySelectorAll('.cat-btn').forEach(btn=>btn.classList.remove('active'));
    b.classList.add('active');
    render();
  };
  catDiv.appendChild(b);
});

function render() {
  const grid = document.getElementById('grid');
  const search = document.getElementById('search').value.toLowerCase();
  grid.innerHTML = '';
  const filtered = RECIPES.filter(r => (currentCat==='All' || r.cat===currentCat) && r.name.toLowerCase().includes(search));
  
  filtered.forEach(r => {
    const d = document.createElement('div');
    d.className = 'recipe-card';
    d.innerHTML = `<img src="${r.icon}" onerror="fixImg(this,'${r.id}')"><div>${r.name}</div>`;
    d.onclick = () => {
      document.getElementById('mTitle').textContent = r.name;
      document.getElementById('mName').textContent = r.name;
      document.getElementById('mCount').textContent = r.count > 1 ? r.count : '';
      const mg = document.getElementById('mGrid');
      mg.innerHTML = '';
      r.grid.forEach(item => {
        const s = document.createElement('div');
        s.className = 'slot';
        if(item) s.innerHTML = `<img src="${item.icon}" onerror="fixImg(this,'${item.id}')">`;
        mg.appendChild(s);
      });
      const resImg = document.getElementById('mResultImg');
      resImg.dataset.step = 0;
      resImg.src = r.icon;
      resImg.onerror = () => fixImg(resImg, r.id);
      document.getElementById('overlay').classList.add('active');
    };
    grid.appendChild(d);
  });
}

function closeModal() { document.getElementById('overlay').classList.remove('active'); }
document.getElementById('search').oninput = render;
render();
</script>
</body>
</html>
