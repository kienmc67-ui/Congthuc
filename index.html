<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ Minecraft Crafting Recipes — PC Texture Fixed</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,#0a0a1f,#15173a,#1f2a44);color:#f0f0ff;min-height:100vh;padding-bottom:80px;}
header{text-align:center;padding:40px 20px 20px;}
header h1{font-family:'Press Start 2P',monospace;font-size:clamp(1.6rem,5vw,2.6rem);color:#ffdd33;text-shadow:0 0 15px rgba(255,221,51,.6);}
.search-wrap{padding:10px 20px 20px;text-align:center;}
.search-box{max-width:560px;margin:0 auto;position:relative;}
.search-box input{width:100%;padding:16px 55px;background:rgba(10,10,31,.85);border:2px solid #ffdd33;border-radius:50px;color:#fff;outline:none;font-size:1.05rem;}
.categories{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:0 15px 25px;}
.cat-btn{padding:9px 18px;background:rgba(31,42,68,.75);border:2px solid rgba(255,221,51,.3);color:#fff;border-radius:30px;font-weight:700;cursor:pointer;transition:.2s;}
.cat-btn.active, .cat-btn:hover{background:#ffdd33;color:#0a0a1f;border-color:#ffdd33;}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:16px;padding:0 15px;max-width:1200px;margin:0 auto;}
.recipe-card{background:rgba(31,42,68,.85);border:2px solid rgba(255,221,51,.25);border-radius:14px;padding:12px;text-align:center;cursor:pointer;transition:.3s;}
.recipe-card:hover{transform:scale(1.06);border-color:#ffdd33;box-shadow:0 10px 25px rgba(255,221,51,.3);}

/* CHỐNG LỖI HIỂN THỊ TEXTURE NHÒE */
.recipe-card img{width:70px;height:70px;margin-bottom:8px;image-rendering:pixelated;}

.no-results{grid-column:1/-1;text-align:center;padding:50px;color:#aaa;font-size:1.1rem;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:100;padding:15px;}
.modal-overlay.active{display:flex;}
.modal{background:#1f2a44;border:3px solid #ffdd33;border-radius:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:25px;position:relative;}
.modal-close{position:absolute;top:12px;right:12px;width:38px;height:38px;background:rgba(255,80,80,.25);color:#ff8080;border:2px solid #ff8080;border-radius:50%;font-size:1.5rem;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.craft-grid{display:grid;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(3,54px);gap:6px;margin:20px auto;background:#3d2814;padding:14px;border:4px solid #2a1a08;border-radius:10px;width:fit-content;}
.craft-slot{width:54px;height:54px;background:#8b8b8b;border-top:2px solid #373737;border-left:2px solid #373737;border-bottom:2px solid #fff;border-right:2px solid #fff;display:flex;align-items:center;justify-content:center;position:relative;}
.craft-slot img{width:46px;height:46px;image-rendering:pixelated;}
.result-slot{width:82px;height:82px;border:4px solid #ffdd33;border-radius:10px;background:#8b8b8b;display:flex;align-items:center;justify-content:center;margin:20px auto;position:relative;}
.result-slot img{width:66px;height:66px;image-rendering:pixelated;}
.result-slot .count{position:absolute;bottom:6px;right:8px;font-family:'Press Start 2P',font-size:1.1rem;color:#fff;text-shadow:1px 1px 2px #000;}
</style>
</head>
<body>

<audio id="clickSound" preload="auto">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<header>
  <h1>🛠️ Minecraft Recipes</h1>
  <p style="color:#b8ffd0;opacity:0.9;">PC Texture • Fixed Shield Icon • Audio Enabled</p>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm công thức... (mace, shield, boat...)" />
  </div>
</div>

<div class="categories" id="categories"></div>
<div class="recipe-grid" id="recipeGrid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <h2 id="modalTitle" style="color:#ffdd33;text-align:center;margin:10px 0;"></h2>
    <p id="modalDesc" style="text-align:center;color:#b8ffd0;margin-bottom:20px;line-height:1.5;"></p>
    
    <div class="craft-grid" id="craftGrid"></div>
    
    <div style="text-align:center;font-size:2.4rem;color:#ffdd33;margin:15px 0;">↓</div>
    
    <div class="result-slot">
      <img id="resultImg" src="" alt="">
      <span class="count" id="resultCount"></span>
    </div>
    <div id="resultName" style="text-align:center;color:#ffdd33;font-weight:bold;font-size:1.2rem;"></div>
  </div>
</div>

<script>
// ================== ÂM THANH & SOURCE ẢNH ==================
const clickSound = document.getElementById('clickSound');
function playClick() {
  clickSound.currentTime = 0;
  clickSound.volume = 0.4;
  clickSound.play();
}

const ITEM_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/item/";
const BLOCK_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/block/";
const ENTITY_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/entity/";

function getIcon(id) { 
  // Fix lỗi Shield icon bị thiếu
  if (id === 'shield') return ITEM_URL + "shield.png";
  return ITEM_URL + id + ".png"; 
}

function formatName(id) { return id.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); }
const I = id => ({ id: id, icon: getIcon(id), name: formatName(id) });

let RECIPES = [];

const stick = I('stick');
const cobble = I('cobblestone');
const iron = I('iron_ingot');
const planks = I('oak_planks');

// Items 1.21 & Cơ bản (Fixed Shield link)
RECIPES.push({ id:'mace', name:'Mace', cat:'Combat', icon: getIcon('mace'), desc: 'Vũ khí cực mạnh từ 1.21.', grid: [null,null,null, null,I('heavy_core'),null, null,I('breeze_rod'),null], count: 1 });
RECIPES.push({ id:'shield', name:'Shield', cat:'Combat', icon: getIcon('shield'), desc: 'Khiên bảo vệ khỏi sát thương.', grid: [planks,iron,planks, planks,planks,planks, null,planks,null], count: 1 });
RECIPES.push({ id:'crafting_table', name:'Crafting Table', cat:'Build', icon: BLOCK_URL + 'crafting_table_top.png', desc: 'Bàn chế tạo.', grid: [null,null,null, null,planks,planks, null,planks,planks], count: 1 });
RECIPES.push({ id:'stick', name:'Stick', cat:'Misc', icon: getIcon('stick'), desc: 'Gậy gỗ.', grid: [null,planks,null, null,planks,null, null,null,null], count: 4 });

// Tools mẫu
const toolMats = [{ prefix: 'iron', mat: iron }, { prefix: 'diamond', mat: I('diamond') }];
toolMats.forEach(t => {
  RECIPES.push({ id:`${t.prefix}_sword`, name:`${formatName(t.prefix)} Sword`, cat:'Combat', icon:getIcon(`${t.prefix}_sword`), grid:[null,t.mat,null, null,t.mat,null, null,stick,null], count:1 });
});

// ================== LOGIC UI ==================
const CATS = ['All','Build','Combat','Misc'];
let currentCat = 'All';
let currentSearch = '';

const catContainer = document.getElementById('categories');
CATS.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = `cat-btn ${cat === 'All' ? 'active' : ''}`;
  btn.textContent = cat;
  btn.onclick = () => { playClick(); currentCat = cat; document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderGrid(); };
  catContainer.appendChild(btn);
});

function handleImgError(imgElement, itemId) {
  if(!imgElement.dataset.retried) {
    imgElement.dataset.retried = "true";
    imgElement.src = BLOCK_URL + itemId + ".png"; 
  } else {
    imgElement.src = ITEM_URL + "barrier.png"; 
  }
}

function renderGrid() {
  const gridEl = document.getElementById('recipeGrid');
  gridEl.innerHTML = '';
  const filtered = RECIPES.filter(r => (currentCat === 'All' || r.cat === currentCat) && (!currentSearch || r.name.toLowerCase().includes(currentSearch)));

  filtered.forEach(r => {
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.innerHTML = `<img src="${r.icon}" onerror="handleImgError(this, '${r.id}')"><div>${r.name}</div>`;
    card.onclick = () => { playClick(); showModal(r); };
    gridEl.appendChild(card);
  });
}

function showModal(r) {
  document.getElementById('modalTitle').textContent = r.name;
  document.getElementById('modalDesc').textContent = r.desc || '';
  document.getElementById('resultName').textContent = r.name;
  document.getElementById('resultCount').textContent = r.count > 1 ? r.count : '';
  const craftGrid = document.getElementById('craftGrid');
  craftGrid.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const slot = document.createElement('div');
    slot.className = 'craft-slot';
    if (r.grid[i]) slot.innerHTML = `<img src="${r.grid[i].icon}" onerror="handleImgError(this, '${r.grid[i].id}')">`;
    craftGrid.appendChild(slot);
  }
  const resImg = document.getElementById('resultImg');
  delete resImg.dataset.retried;
  resImg.src = r.icon;
  document.getElementById('modalOverlay').classList.add('active');
}

document.getElementById('searchInput').addEventListener('input', e => { currentSearch = e.target.value.toLowerCase(); renderGrid(); });
document.getElementById('modalClose').onclick = () => { playClick(); document.getElementById('modalOverlay').classList.remove('active'); };

renderGrid();
</script>
</body>
</html>
