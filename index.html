<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛠️ Minecraft Crafting - Cute & Xịn Xò</title>
    <style>
        :root { --gold: #ffdd33; --dark: #0a0a1f; --navy: #1f2a44; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: linear-gradient(135deg, var(--dark), var(--navy)); 
            color: #eee; margin: 0; padding: 20px; 
        }
        h1 { text-align: center; color: var(--gold); text-shadow: 0 0 15px var(--gold); font-size: 2.8em; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #aaffaa; margin-bottom: 20px; }
        .search { 
            width: 100%; max-width: 700px; margin: 0 auto 30px; 
            padding: 18px 25px; font-size: 20px; border-radius: 50px; 
            border: none; outline: none; background: #16213e; color: white; 
            box-shadow: 0 0 20px rgba(255,221,51,0.3);
        }
        .categories { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 30px; }
        .category-btn { 
            padding: 12px 24px; background: #16213e; color: white; border: none; 
            border-radius: 30px; cursor: pointer; transition: all 0.3s; font-weight: bold;
        }
        .category-btn:hover, .category-btn.active { background: var(--gold); color: #000; transform: scale(1.08); }
        .items { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 18px; max-width: 1300px; margin: 0 auto; 
        }
        .item { 
            background: #16213e; padding: 15px; border-radius: 18px; text-align: center; 
            cursor: pointer; transition: all 0.4s; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .item:hover { transform: scale(1.12) rotate(2deg); box-shadow: 0 0 25px var(--gold); }
        .item img { width: 72px; height: 72px; image-rendering: pixelated; }
        .item p { margin: 10px 0 0; font-weight: bold; color: #ffddaa; }
        
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
        .modal-content { 
            background: #1f2a44; padding: 30px; border-radius: 25px; max-width: 520px; 
            width: 90%; position: relative; border: 6px solid #555; box-shadow: 0 0 40px var(--gold);
        }
        .close { position: absolute; top: 15px; right: 25px; font-size: 36px; cursor: pointer; color: var(--gold); }
        .crafting-grid { 
            display: grid; grid-template-columns: repeat(3, 68px); gap: 10px; 
            margin: 25px auto; justify-content: center; 
        }
        .slot { 
            width: 68px; height: 68px; background: #0f1629; border: 4px solid #8b5a2b; 
            display: flex; align-items: center; justify-content: center; font-size: 11px; 
            color: #ddd; text-align: center; overflow: hidden; position: relative;
        }
        .slot:hover { background: #2a3a5a; }
        .result { 
            margin: 25px 0 15px; font-size: 28px; color: var(--gold); 
            text-shadow: 0 0 10px var(--gold); display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .result img { width: 64px; height: 64px; }
    </style>
</head>
<body>
    <h1>🛠️ Minecraft Crafting Recipes</h1>
    <p class="subtitle">Tất cả công thức chế tạo – Cute • Xịn xò • Siêu rõ ràng (Phiên bản mới nhất)</p>
    
    <input type="text" id="search" class="search" placeholder="🔍 Tìm vật phẩm... (diamond sword, bread, netherite pickaxe...)">

    <div class="categories" id="categories"></div>
    <div class="items" id="items"></div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <h2 id="modal-title" style="color:var(--gold); text-align:center;"></h2>
            <div id="modal-grid" class="crafting-grid"></div>
            <div class="result" id="modal-result"></div>
            <p id="modal-desc" style="text-align:center; font-size:15px; color:#ccc;"></p>
        </div>
    </div>

    <script>
        // Âm thanh đã tai (Minecraft style)
        const clickSound = new Audio("https://www.myinstants.com/media/sounds/minecraft-click.mp3"); // tiếng click
        const craftSound = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"); // tạm thay bằng sound vui, bạn có thể thay link tốt hơn
        const pickupSound = new Audio("https://www.myinstants.com/media/sounds/minecraft-pickup.mp3"); // nếu link không chạy, thay bằng link khác

        const recipes = [
            // === BUILDING ===
            { name: "Crafting Table", category: "Building", grid: ["Oak Planks","Oak Planks","","Oak Planks","Oak Planks","","","",""], result: "Crafting Table", count: 1, desc: "Mở bàn chế tạo 3x3" },
            { name: "Furnace", category: "Building", grid: ["Cobblestone","Cobblestone","Cobblestone","Cobblestone","","Cobblestone","Cobblestone","Cobblestone","Cobblestone"], result: "Furnace", count: 1, desc: "Nung đồ" },
            { name: "Chest", category: "Building", grid: ["Oak Planks","Oak Planks","Oak Planks","Oak Planks","","Oak Planks","Oak Planks","Oak Planks","Oak Planks"], result: "Chest", count: 1, desc: "Lưu trữ đồ" },
            { name: "Bed", category: "Building", grid: ["Red Wool","Red Wool","Red Wool","Oak Planks","Oak Planks","Oak Planks","","",""], result: "Red Bed", count: 1, desc: "Ngủ qua đêm" },
            
            // === TOOLS ===
            { name: "Wooden Pickaxe", category: "Tools", grid: ["Oak Planks","Oak Planks","Oak Planks","","Stick","","","Stick",""], result: "Wooden Pickaxe", count: 1, desc: "Đào đá cơ bản" },
            { name: "Stone Pickaxe", category: "Tools", grid: ["Cobblestone","Cobblestone","Cobblestone","","Stick","","","Stick",""], result: "Stone Pickaxe", count: 1, desc: "Đào nhanh hơn" },
            { name: "Iron Pickaxe", category: "Tools", grid: ["Iron Ingot","Iron Ingot","Iron Ingot","","Stick","","","Stick",""], result: "Iron Pickaxe", count: 1, desc: "Đào sắt & vàng" },
            { name: "Diamond Pickaxe", category: "Tools", grid: ["Diamond","Diamond","Diamond","","Stick","","","Stick",""], result: "Diamond Pickaxe", count: 1, desc: "Đào obsidian" },
            { name: "Netherite Pickaxe", category: "Tools", grid: ["Netherite Ingot","","","Diamond Pickaxe","","","","",""], result: "Netherite Pickaxe", count: 1, desc: "Mạnh nhất (Smithing Table)" },
            
            // === WEAPONS & COMBAT ===
            { name: "Wooden Sword", category: "Combat", grid: ["Oak Planks","","","Oak Planks","","","Stick","",""], result: "Wooden Sword", count: 1, desc: "Vũ khí cơ bản" },
            { name: "Diamond Sword", category: "Combat", grid: ["Diamond","","","Diamond","","","Stick","",""], result: "Diamond Sword", count: 1, desc: "Sát thương cao" },
            { name: "Shield", category: "Combat", grid: ["Oak Planks","Iron Ingot","Oak Planks","Oak Planks","","Oak Planks","Oak Planks","","Oak Planks"], result: "Shield", count: 1, desc: "Chặn đạn & tấn công" },
            { name: "Bow", category: "Combat", grid: ["String","","String","Stick","","Stick","String","","String"], result: "Bow", count: 1, desc: "Bắn tên" },
            
            // === FOOD ===
            { name: "Bread", category: "Food", grid: ["Wheat","Wheat","Wheat","","","","","",""], result: "Bread", count: 1, desc: "Thức ăn nhanh" },
            { name: "Cake", category: "Food", grid: ["Milk Bucket","Sugar","Egg","Wheat","Wheat","Wheat","Milk Bucket","Sugar","Milk Bucket"], result: "Cake", count: 1, desc: "Ngọt ngào" },
            { name: "Golden Apple", category: "Food", grid: ["Gold Ingot","Gold Ingot","Gold Ingot","Gold Ingot","Apple","Gold Ingot","Gold Ingot","Gold Ingot","Gold Ingot"], result: "Golden Apple", count: 1, desc: "Hồi máu mạnh" },
            
            // Thêm nhiều recipe nữa (mình rút gọn code để dễ copy, nhưng thực tế có hơn 100)
            // Bạn có thể yêu cầu mình bổ sung thêm bất kỳ món nào (Mace, Elytra, Beacon, TNT, Boat, Redstone components...)
        ];

        const categories = ["All", "Building", "Tools", "Combat", "Food", "Redstone", "Transportation", "Armor", "Decoration"];

        function renderCategories() {
            const catDiv = document.getElementById("categories");
            catDiv.innerHTML = "";
            categories.forEach(cat => {
                const btn = document.createElement("button");
                btn.className = "category-btn";
                btn.textContent = cat;
                if (cat === "All") btn.classList.add("active");
                btn.onclick = () => {
                    document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    filterRecipes(cat);
                };
                catDiv.appendChild(btn);
            });
        }

        function renderItems(filtered) {
            const container = document.getElementById("items");
            container.innerHTML = "";
            filtered.forEach(r => {
                const div = document.createElement("div");
                div.className = "item";
                div.innerHTML = `
                    <img src="https://via.placeholder.com/72/2a3a5a/fff?text=\( {r.result.substring(0,2)}" alt=" \){r.result}">
                    <p>${r.result}</p>
                `;
                div.onclick = () => {
                    clickSound.play().catch(()=>{});
                    showRecipe(r);
                };
                container.appendChild(div);
            });
        }

        function filterRecipes(cat) {
            let filtered = recipes;
            if (cat !== "All") filtered = recipes.filter(r => r.category === cat);
            renderItems(filtered);
        }

        function showRecipe(r) {
            craftSound.play().catch(()=>{});
            document.getElementById("modal-title").textContent = r.result;
            document.getElementById("modal-desc").textContent = r.desc || "Công thức chế tạo chuẩn Minecraft.";

            const grid = document.getElementById("modal-grid");
            grid.innerHTML = "";
            const positions = r.grid || Array(9).fill("");
            positions.forEach(item => {
                const slot = document.createElement("div");
                slot.className = "slot";
                slot.textContent = item || "";
                grid.appendChild(slot);
            });

            const resultDiv = document.getElementById("modal-result");
            resultDiv.innerHTML = `
                <img src="https://via.placeholder.com/64/ffdd33/000?text=\( {r.result.substring(0,2)}" alt=" \){r.result}">
                <span>\( {r.result} × \){r.count || 1}</span>
            `;

            document.getElementById("modal").style.display = "flex";
            setTimeout(() => pickupSound.play().catch(()=>{}), 300);
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        // Tìm kiếm realtime
        document.getElementById("search").addEventListener("input", (e) => {
            const term = e.target.value.toLowerCase().trim();
            const filtered = recipes.filter(r => 
                r.name.toLowerCase().includes(term) || 
                r.result.toLowerCase().includes(term)
            );
            renderItems(filtered);
        });

        // Khởi chạy
        renderCategories();
        renderItems(recipes);

        // Đóng modal khi click ngoài
        document.getElementById("modal").addEventListener("click", (e) => {
            if (e.target === document.getElementById("modal")) closeModal();
        });
    </script>
</body>
</html>
