<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ Minecraft Crafting Recipes — Bedrock 1.21.11</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Quicksand',sans-serif;background:#0a0a1f;color:#fff}
.recipe-card img,.craft-slot img,.result-slot img{image-rendering:pixelated}
</style>
</head>
<body>

<h2 style="text-align:center;padding:20px">Minecraft Recipes (FIX IMAGE)</h2>
<div id="recipeGrid"></div>

<script>
// ===== CDN CHUẨN =====
const ITEM = "https://mcasset.cloud/1.21/assets/minecraft/textures/item/";
const BLOCK = "https://mcasset.cloud/1.21/assets/minecraft/textures/block/";
const FALLBACK = ITEM + "barrier.png";

// ===== ICON FIX =====
function getIcon(name){

  // item mới chưa có
  if (["heavy_core","breeze_rod","wind_charge"].includes(name)){
    return ITEM + "diamond.png";
  }

  // special đúng tên
  const map = {
    repeater:"redstone_repeater",
    comparator:"comparator",
    redstone_torch:"redstone_torch",
    crafting_table:"crafting_table"
  };

  if (map[name]) return ITEM + map[name] + ".png";

  // detect block
  if (
    name.includes("planks") ||
    name.includes("log") ||
    name.includes("stone") ||
    name.includes("ore") ||
    name.includes("block") ||
    name.includes("sand") ||
    name.includes("wheat") ||
    name.includes("cobblestone")
  ){
    return BLOCK + name + ".png";
  }

  return ITEM + name + ".png";
}

const I = n => ({icon:getIcon(n),name:n});

// ===== TEST DATA (GIỮ NGUYÊN CÁCH CỦA BẠN) =====
const RECIPES = [
  {name:"Stick",icon:getIcon("stick")},
  {name:"Oak Planks",icon:getIcon("oak_planks")},
  {name:"Diamond Sword",icon:getIcon("diamond_sword")},
  {name:"Bread",icon:getIcon("bread")},
  {name:"Repeater",icon:getIcon("repeater")},
  {name:"Mace",icon:getIcon("mace")}
];

// ===== RENDER =====
const grid = document.getElementById("recipeGrid");

RECIPES.forEach(r=>{
  const div=document.createElement("div");
  div.className="recipe-card";
  div.innerHTML=`
    <img src="${r.icon}" onerror="this.src='${FALLBACK}'">
    <div>${r.name}</div>
  `;
  grid.appendChild(div);
});
</script>

</body>
</html>
