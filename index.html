<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ Minecraft Ultimate Crafting Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,#0a0a1f,#15173a,#1f2a44);color:#f0f0ff;min-height:100vh;padding-bottom:80px;}

header{text-align:center;padding:40px 20px 10px;}
header h1{font-family:'Press Start 2P',monospace;font-size:clamp(1rem,4vw,2rem);color:#ffdd33;text-shadow:0 0 15px rgba(255,221,51,.6);}

/* Edition Switcher */
.edition-selector{display:flex;justify-content:center;gap:15px;margin:20px 0;}
.edition-btn{padding:12px 20px;border-radius:8px;border:2px solid #ffdd33;background:transparent;color:#ffdd33;font-family:'Press Start 2P',cursive;font-size:0.6rem;cursor:pointer;transition:0.3s;}
.edition-btn.active{background:#ffdd33;color:#0a0a1f;box-shadow:0 0 20px rgba(255,221,51,0.4);}

.search-wrap{text-align:center;padding:0 20px;}
.search-box input{width:100%;max-width:600px;padding:15px 25px;background:rgba(10,10,31,0.8);border:2px solid #44ffaa;border-radius:50px;color:#fff;outline:none;font-size:1rem;}

.categories{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:20px 15px;}
.cat-btn{padding:8px 16px;background:rgba(31,42,68,0.7);border:1px solid rgba(68,255,170,0.3);color:#fff;border-radius:20px;font-weight:700;cursor:pointer;transition:0.2s;}
.cat-btn.active{background:#44ffaa;color:#0a0a1f;border-color:#44ffaa;}

.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:15px;padding:0 15px;max-width:1200px;margin:0 auto;}
.recipe-card{background:rgba(31,42,68,0.85);border:2px solid rgba(255,221,51,0.2);border-radius:12px;padding:15px;text-align:center;cursor:pointer;transition:0.3s;position:relative;}
.recipe-card:hover{transform:translateY(-5px);border-color:#44ffaa;box-shadow:0 10px 20px rgba(68,255,170,0.2);}
.recipe-card img{width:64px;height:64px;image-rendering:pixelated;margin-bottom:10px;}
.ed-tag{position:absolute;top:8px;right:8px;font-size:0.5rem;background:#ffdd33;color:#000;padding:2px 5px;border-radius:4px;font-weight:bold;}

/* Modal Crafting */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:1000;padding:15px;}
.modal-overlay.active{display:flex;}
.modal{background:#1f2a44;border:3px solid #44ffaa;border-radius:20px;width:100%;max-width:480px;padding:25px;position:relative;}
.modal-close{position:absolute;top:15px;right:15px;background:none;border:none;color:#ff8080;font-size:2rem;cursor:pointer;}

.crafting-grid-ui{background:#8b8b8b;padding:15px;border:4px solid #373737;border-radius:8px;width:fit-content;margin:20px auto;display:grid;grid-template-columns:repeat(3,54px);gap:4px;}
.slot{width:54px;height:54px;background:#8b8b8b;border:2px solid #373737;display:flex;align-items:center;justify-content:center;box-shadow: inset 2px 2px 0 #373737, inset -2px -2px 0 #fff;}
.slot img{width:42px;height:42px;image-rendering:pixelated;}

.result-area{text-align:center;margin-top:20px;}
.result-slot{width:80px;height:80px;background:#8b8b8b;border:4px solid #44ffaa;margin:0 auto;display:flex;align-items:center;justify-content:center;position:relative;}
.result-slot img{width:56px;height:56px;image-rendering:pixelated;}
.res-count{position:absolute;bottom:4px;right:6px;font-family:'Press Start 2P';font-size:0.9rem;color:#fff;text-shadow:2px 2px #000;}
</style>
</head>
<body>

<header>
  <h1>MINECRAFT RECIPES</h1>
  <div class="edition-selector">
    <button class="edition-btn active" id="btn-java" onclick="setEdition('java')">JAVA EDITION</button>
    <button class="edition-btn" id="btn-pe" onclick="setEdition('bedrock')">BEDROCK / PE</button>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Tìm công thức (mace, armor, cake, piston...)" />
  </div>
</div>

<div class="categories" id="catBox"></div>
<div class="recipe-grid" id="recipeGrid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="mTitle" style="text-align:center;color:#44ffaa;margin-bottom:10px;"></h2>
    <p id="mDesc" style="text-align:center;color:#b8ffd0;font-size:0.9rem;margin-bottom:15px;"></p>
    <div class="crafting-grid-ui" id="mGrid"></div>
    <div class="result-area">
      <div style="font-size:1.5rem;color:#ffdd33;margin-bottom:10px;">↓</div>
      <div class="result-slot">
        <img id="mResImg" src="">
        <span class="res-count" id="mCount"></span>
      </div>
      <p id="mResName" style="margin-top:10px;font-weight:bold;color:#44ffaa;"></p>
    </div>
  </div>
</div>

<script>
const ITEM_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/item/";
const BLOCK_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/block/";

let currentEdition = 'java';
let currentCat = 'All';
let currentSearch = '';

const I = (id, type='item') => ({ 
    id, 
    icon: (type === 'block' ? BLOCK_URL : ITEM_URL) + id + ".png", 
    name: id.replace(/_/g, ' ') 
});

let JAVA_DB = [];
let PE_DB = [];

function initData() {
    const plank = I('oak_planks', 'block');
    const stick = I('stick');
    const iron = I('iron_ingot');
    const gold = I('gold_ingot');
    const diamond = I('diamond');
    const redstone = I('redstone');
    const cobble = I('cobblestone', 'block');

    // --- 1. BUILD CATEGORY ---
    const buildItems = [
        { id:'crafting_table', name:'Crafting Table', cat:'Build', icon: BLOCK_URL+'crafting_table_top.png', grid:[null,null,null, null,plank,plank, null,plank,plank], count:1 },
        { id:'chest', name:'Chest', cat:'Build', icon: BLOCK_URL+'chest_front.png', grid:[plank,plank,plank, plank,null,plank, plank,plank,plank], count:1 },
        { id:'furnace', name:'Furnace', cat:'Build', icon: BLOCK_URL+'furnace_front.png', grid:[cobble,cobble,cobble, cobble,null,cobble, cobble,cobble,cobble], count:1 }
    ];
    buildItems.forEach(i => { JAVA_DB.push(i); PE_DB.push(i); });

    // --- 2. ARMOR CATEGORY ---
    const armorMats = [{p:'iron', m:iron}, {p:'gold', m:gold}, {p:'diamond', m:diamond}];
    armorMats.forEach(mat => {
        const types = [
            {t:'helmet', g:[mat.m,mat.m,mat.m, mat.m,null,mat.m, null,null,null]},
            {t:'chestplate', g:[mat.m,null,mat.m, mat.m,mat.m,mat.m, mat.m,mat.m,mat.m]},
            {t:'leggings', g:[mat.m,mat.m,mat.m, mat.m,null,mat.m, mat.m,null,mat.m]},
            {t:'boots', g:[null,null,null, mat.m,null,mat.m, mat.m,null,mat.m]}
        ];
        types.forEach(a => {
            const item = { id:mat.p+'_'+a.t, name:mat.p+' '+a.t, cat:'Armor', icon: ITEM_URL+mat.p+'_'+a.t+'.png', grid: a.g, count:1 };
            JAVA_DB.push(item); PE_DB.push(item);
        });
    });

    // --- 3. REDSTONE & NEW 1.21 (Crafter) ---
    const rsItems = [
        { id:'piston', name:'Piston', cat:'Redstone', icon: BLOCK_URL+'piston_side.png', grid:[plank,plank,plank, cobble,iron,cobble, cobble,redstone,cobble], count:1 },
        { id:'observer', name:'Observer', cat:'Redstone', icon: BLOCK_URL+'observer_front.png', grid:[cobble,cobble,cobble, redstone,redstone,I('quartz'), cobble,cobble,cobble], count:1 },
        { id:'crafter', name:'Crafter (1.21)', cat:'Redstone', icon: BLOCK_URL+'crafter_top.png', grid:[iron,iron,iron, iron,I('crafting_table','block'),iron, redstone,I('dropper','block'),redstone], count:1 }
    ];
    rsItems.forEach(i => { JAVA_DB.push(i); PE_DB.push(i); });

    // --- 4. FOOD CATEGORY ---
    const foodItems = [
        { id:'cake', name:'Cake', cat:'Food', icon: ITEM_URL+'cake.png', grid:[I('milk_bucket'),I('milk_bucket'),I('milk_bucket'), I('sugar'),I('egg'),I('sugar'), I('wheat'),I('wheat'),I('wheat')], count:1 },
        { id:'golden_apple', name:'Golden Apple', cat:'Food', icon: ITEM_URL+'golden_apple.png', grid:[gold,gold,gold, gold,I('apple'),gold, gold,gold,gold], count:1 },
        { id:'bread', name:'Bread', cat:'Food', icon: ITEM_URL+'bread.png', grid:[null,null,null, I('wheat'),I('wheat'),I('wheat'), null,null,null], count:1 }
    ];
    foodItems.forEach(i => { JAVA_DB.push(i); PE_DB.push(i); });

    // --- 5. COMBAT (Mace 1.21) ---
    const mace = { id:'mace', name:'Mace (1.21)', cat:'Combat', icon: ITEM_URL+'mace.png', desc:'Công thức mới nhất 1.21', grid:[null,null,null, null,I('heavy_core'),null, null,I('breeze_rod'),null], count:1 };
    JAVA_DB.push(mace); PE_DB.push(mace);

    // --- 6. PHÂN TÁCH LOGIC THUYỀN (BOAT) ---
    const woods = ['oak','spruce','birch','jungle'];
    woods.forEach(w => {
        const p = I(w+'_planks', 'block');
        // Java: Không cần xẻng
        JAVA_DB.push({ id:w+'_boat', name:w+' Boat', cat:'Misc', icon: ITEM_URL+w+'_boat.png', desc:'Java: Không cần xẻng gỗ.', grid:[null,null,null, p,null,p, p,p,p], count:1 });
        // PE: Cần xẻng gỗ
        PE_DB.push({ id:w+'_boat', name:w+' Boat', cat:'Misc', icon: ITEM_URL+w+'_boat.png', desc:'PE: Cần 1 xẻng gỗ ở giữa.', grid:[null,null,null, p,I('wooden_shovel'),p, p,p,p], count:1 });
    });
}

function setEdition(ed) {
    currentEdition = ed;
    document.getElementById('btn-java').classList.toggle('active', ed === 'java');
    document.getElementById('btn-pe').classList.toggle('active', ed === 'bedrock');
    renderGrid();
}

function renderGrid() {
    const gridEl = document.getElementById('recipeGrid');
    gridEl.innerHTML = '';
    const db = currentEdition === 'java' ? JAVA_DB : PE_DB;
    
    const filtered = db.filter(r => 
        (currentCat === 'All' || r.cat === currentCat) &&
        (r.name.toLowerCase().includes(currentSearch))
    );

    filtered.forEach(r => {
        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.innerHTML = `
            <div class="ed-tag">${currentEdition.toUpperCase()}</div>
            <img src="${r.icon}" onerror="this.src='${ITEM_URL}barrier.png'">
            <div style="font-weight:700; font-size:0.8rem;">${r.name.toUpperCase()}</div>
            <div style="font-size:0.65rem; color:#44ffaa; margin-top:5px;">${r.cat}</div>
        `;
        card.onclick = () => openModal(r);
        gridEl.appendChild(card);
    });
}

function openModal(r) {
    document.getElementById('mTitle').innerText = r.name;
    document.getElementById('mDesc').innerText = r.desc || `Công thức chế tạo ${r.name} trong Minecraft.`;
    document.getElementById('mResImg').src = r.icon;
    document.getElementById('mResName').innerText = r.name;
    document.getElementById('mCount').innerText = r.count > 1 ? r.count : '';
    
    const gridUi = document.getElementById('mGrid');
    gridUi.innerHTML = '';
    for(let i=0; i<9; i++) {
        const item = r.grid[i];
        gridUi.innerHTML += `<div class="slot">${item ? `<img src="${item.icon}" title="${item.name}">` : ''}</div>`;
    }
    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

// Init Categories
const cats = ['All', 'Build', 'Armor', 'Redstone', 'Food', 'Combat', 'Misc'];
const catBox = document.getElementById('catBox');
cats.forEach(c => {
    const b = document.createElement('button');
    b.className = `cat-btn ${c === 'All' ? 'active' : ''}`;
    b.innerText = c;
    b.onclick = () => {
        currentCat = c;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        renderGrid();
    };
    catBox.appendChild(b);
});

document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value.toLowerCase();
    renderGrid();
});

initData();
renderGrid();
</script>
</body>
</html>
