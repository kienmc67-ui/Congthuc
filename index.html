<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ Minecraft Crafting Guide: Java vs PE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Quicksand',sans-serif;background:#0a0a1f;color:#f0f0ff;min-height:100vh;padding-bottom:50px;}

/* Header & Tabs */
header{text-align:center;padding:30px 20px;}
header h1{font-family:'Press Start 2P',monospace;font-size:1.8rem;color:#ffdd33;margin-bottom:20px;}

.edition-tabs{display:flex;justify-content:center;gap:10px;margin-bottom:30px;}
.tab-btn{padding:12px 24px;border:none;border-radius:8px;font-family:'Press Start 2P',monospace;font-size:0.7rem;cursor:pointer;transition:.3s;background:rgba(255,255,255,0.1);color:#fff;}
.tab-btn.active{background:#ffdd33;color:#0a0a1f;box-shadow:0 0 15px rgba(255,221,51,0.4);}

/* Search & UI */
.search-wrap{text-align:center;margin-bottom:20px;}
.search-box input{width:90%;max-width:500px;padding:15px 25px;border-radius:30px;border:2px solid #ffdd33;background:#15173a;color:#fff;outline:none;}
.categories{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:20px;}
.cat-btn{padding:8px 16px;background:#1f2a44;border:1px solid #ffdd33;color:#fff;border-radius:20px;cursor:pointer;font-size:0.8rem;}
.cat-btn.active{background:#ffdd33;color:#000;}

/* Grid */
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:15px;max-width:1100px;margin:0 auto;padding:0 15px;}
.recipe-card{background:rgba(31,42,68,0.8);border:2px solid rgba(255,221,51,0.2);border-radius:12px;padding:15px;text-align:center;cursor:pointer;transition:.2s;}
.recipe-card:hover{transform:translateY(-5px);border-color:#ffdd33;}
.recipe-card img{width:64px;height:64px;image-rendering:pixelated;margin-bottom:10px;}

/* Modal Crafting */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.active{display:flex;}
.modal{background:#1f2a44;padding:30px;border-radius:20px;border:3px solid #ffdd33;width:95%;max-width:450px;position:relative;}
.close-btn{position:absolute;top:15px;right:15px;color:#ffdd33;cursor:pointer;font-size:1.5rem;}

.crafting-container{background:#8b8b8b;padding:15px;border:4px solid #373737;border-radius:4px;width:fit-content;margin:20px auto;}
.craft-grid{display:grid;grid-template-columns:repeat(3,50px);gap:4px;}
.slot{width:50px;height:50px;background:#8b8b8b;border:2px solid #373737;display:flex;align-items:center;justify-content:center;box-shadow: inset 2px 2px 0 #373737, inset -2px -2px 0 #fff;}
.slot img{width:40px;height:40px;image-rendering:pixelated;}
.result-area{text-align:center;margin-top:20px;}
.result-slot{width:70px;height:70px;background:#8b8b8b;margin:0 auto;border:3px solid #ffdd33;display:flex;align-items:center;justify-content:center;position:relative;}
.result-slot img{width:54px;height:54px;image-rendering:pixelated;}
.count{position:absolute;bottom:2px;right:5px;font-family:'Press Start 2P';font-size:0.8rem;text-shadow:2px 2px #000;}
</style>
</head>
<body>

<header>
    <h1>MINECRAFT CRAFTING</h1>
    <div class="edition-tabs">
        <button class="tab-btn active" onclick="switchEdition('java')">JAVA EDITION</button>
        <button class="tab-btn" onclick="switchEdition('pe')">BEDROCK / PE</button>
    </div>
</header>

<div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Tìm kiếm vật phẩm..." oninput="filterRecipes()">
</div>

<div class="categories" id="catBox"></div>
<div class="recipe-grid" id="recipeGrid"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <h2 id="mTitle" style="text-align:center;color:#ffdd33;margin-bottom:5px;"></h2>
        <p id="mDesc" style="text-align:center;font-size:0.8rem;color:#b8ffd0;margin-bottom:20px;"></p>
        
        <div class="crafting-container">
            <div class="craft-grid" id="mGrid"></div>
        </div>
        
        <div class="result-area">
            <div style="font-size:1.5rem;color:#ffdd33;margin-bottom:10px;">↓</div>
            <div class="result-slot">
                <img id="mResultImg" src="">
                <span class="count" id="mCount"></span>
            </div>
            <p id="mResultName" style="margin-top:10px;font-weight:bold;"></p>
        </div>
    </div>
</div>

<script>
const ITEM_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/item/";
const BLOCK_URL = "https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/textures/block/";

let currentEdition = 'java';
let currentCat = 'All';
const I = (id, isBlock=false) => ({ id, icon: (isBlock ? BLOCK_URL : ITEM_URL) + id + ".png", name: id.replace(/_/g, ' ') });

// Tài nguyên dùng chung
const planks = I('oak_planks', true);
const stick = I('stick');
const iron = I('iron_ingot');
const cobble = I('cobblestone', true);

// Định nghĩa dữ liệu riêng biệt
const JAVA_DB = [];
const PE_DB = [];

function initRecipes() {
    // 1. Fix lỗi Chest (Dùng block texture)
    const chestRecipe = { 
        id:'chest', name:'Chest', cat:'Storage', 
        icon: BLOCK_URL + 'chest_front.png', 
        desc: 'Dùng để lưu trữ đồ đạc.', 
        grid: [planks,planks,planks, planks,null,planks, planks,planks,planks], 
        count: 1 
    };
    JAVA_DB.push(chestRecipe);
    PE_DB.push(chestRecipe);

    // 2. Logic Boat (Khác biệt chính)
    const boatWoods = ['oak','spruce','birch','jungle'];
    boatWoods.forEach(w => {
        const p = I(w+'_planks', true);
        const bIcon = ITEM_URL + w + '_boat.png';
        
        // Java
        JAVA_DB.push({
            id: w+'_boat', name: w+' Boat', cat:'Transport', icon: bIcon,
            desc: 'Thuyền bản Java không cần xẻng.',
            grid: [null,null,null, p,null,p, p,p,p], count: 1
        });
        // PE / Bedrock
        PE_DB.push({
            id: w+'_boat', name: w+' Boat', cat:'Transport', icon: bIcon,
            desc: 'Thuyền bản PE bắt buộc phải có xẻng gỗ.',
            grid: [null,null,null, p,I('wooden_shovel'),p, p,p,p], count: 1
        });
    });

    // 3. Mace (1.21)
    const mace = {
        id:'mace', name:'Mace', cat:'Combat', icon: ITEM_URL+'mace.png',
        desc: 'Vũ khí cực mạnh từ bản cập nhật 1.21.',
        grid: [null,null,null, null,I('heavy_core'),null, null,I('breeze_rod'),null], count:1
    };
    JAVA_DB.push(mace); PE_DB.push(mace);

    // 4. Basic Tools
    const tools = ['sword','pickaxe','axe','shovel','hoe'];
    tools.forEach(t => {
        let grid = [];
        if(t==='sword') grid = [null,iron,null, null,iron,null, null,stick,null];
        if(t==='pickaxe') grid = [iron,iron,iron, null,stick,null, null,stick,null];
        
        const item = { id:'iron_'+t, name:'Iron '+t, cat:'Tools', icon: ITEM_URL+'iron_'+t+'.png', grid: grid, count:1 };
        JAVA_DB.push(item); PE_DB.push(item);
    });
}

function switchEdition(ed) {
    currentEdition = ed;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderGrid();
}

function renderGrid() {
    const grid = document.getElementById('recipeGrid');
    const db = currentEdition === 'java' ? JAVA_DB : PE_DB;
    const search = document.getElementById('searchInput').value.toLowerCase();
    
    grid.innerHTML = '';
    const filtered = db.filter(r => (currentCat === 'All' || r.cat === currentCat) && r.name.toLowerCase().includes(search));

    filtered.forEach(r => {
        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.innerHTML = `<img src="${r.icon}"><div>${r.name}</div><div style="font-size:0.6rem; color:#44ffaa">${r.cat}</div>`;
        card.onclick = () => openModal(r);
        grid.appendChild(card);
    });
}

function openModal(r) {
    document.getElementById('mTitle').innerText = r.name;
    document.getElementById('mDesc').innerText = r.desc;
    document.getElementById('mResultImg').src = r.icon;
    document.getElementById('mResultName').innerText = r.name;
    document.getElementById('mCount').innerText = r.count > 1 ? r.count : '';
    
    const gridHtml = document.getElementById('mGrid');
    gridHtml.innerHTML = '';
    for(let i=0; i<9; i++) {
        const item = r.grid[i];
        gridHtml.innerHTML += `<div class="slot">${item ? `<img src="${item.icon}">` : ''}</div>`;
    }
    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

function filterRecipes() { renderGrid(); }

// Initialize
initRecipes();
renderGrid();

// Render Categories
const cats = ['All', 'Tools', 'Combat', 'Transport', 'Storage'];
const catBox = document.getElementById('catBox');
cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat-btn' + (c==='All'?' active':'');
    b.innerText = c;
    b.onclick = (e) => {
        currentCat = c;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        renderGrid();
    };
    catBox.appendChild(b);
});
</script>
</body>
</html>
